name: Worldgen Preview Snapshot

# P0 最小版：worldgen 改动 / 手动触发 → 后台跑 server + xvfb headless client →
# 截图 artifact 上传。P1 加多角度 + 装饰；P2 加 PR comment + base ref SSIM diff。
#
# 现状（loom 1.6-SNAPSHOT）：手动 xvfb-run 包 ./gradlew runClientPreview。
# ubuntu-24.04 预装 xvfb 21.x 无需 apt。FabricMC/fabric-api 官方 CI 同模式实跑。

on:
  pull_request:
    paths:
      - "worldgen/**"
      - "server/zones*.json"
      - "client/src/main/java/com/bong/client/preview/**"
      - "client/preview-harness.json"
      - "scripts/preview/**"
      - ".github/workflows/worldgen-preview.yml"
  workflow_dispatch: {}
  # P2 占位：issue_comment 含 @preview-worldgen 触发；本 PR 不实装。

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: worldgen-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/bong-target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install worldgen Python deps
        run: pip install numpy

      - name: Run worldgen pipeline (raster + PNG previews)
        # focus-{layout,surface,height}-preview.png + zone-*-preview.png
        # 这些是 matplotlib 无关的纯 stdlib + numpy 出图（exporters.py 用 zlib
        # 手写 PNG），看到的是大尺度 raster 顶视，跟 client 截图互补：
        # - raster PNG 看几千 blocks 整张图（worldgen 全貌、山脉、zone 布局）
        # - client 截图看 spawn 周围 ~512 blocks 的真游戏画面
        working-directory: worldgen
        run: bash pipeline.sh ../server/zones.worldview.example.json generated/snapshot raster

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            /tmp/bong-target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-preview-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-preview-
            ${{ runner.os }}-cargo-

      - name: Cache Gradle / Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            client/.gradle
          key: ${{ runner.os }}-gradle-preview-${{ hashFiles('client/build.gradle', 'client/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-preview-
            ${{ runner.os }}-gradle-

      - name: Build server (release) — 让后续 cargo run 直接命中 cache
        working-directory: server
        run: cargo build --release

      - name: Start headless Bong server
        run: bash scripts/preview/run-server-headless.sh --release --timeout 120

      - name: Run Fabric client headless (xvfb + preview harness)
        working-directory: client
        env:
          BONG_PREVIEW_HARNESS: "1"
          BONG_PREVIEW_CONFIG: ${{ github.workspace }}/client/preview-harness.json
        # xvfb-run 自带 -a 抢未用 :N display；mesa llvmpipe 自动接管 OpenGL。
        # client.scheduleStop() 由 PreviewSession 拍完照后调用退出；workflow
        # timeout-minutes 兜底防止 mod 状态机卡住。
        run: |
          xvfb-run -a --server-args='-screen 0 1280x720x24' \
            ./gradlew runClientPreview --no-daemon --stacktrace

      - name: Stop server (cleanup)
        if: always()
        run: |
          if [ -f /tmp/bong-preview-server.pid ]; then
            PID=$(cat /tmp/bong-preview-server.pid)
            kill -TERM "$PID" 2>/dev/null || true
            rm -f /tmp/bong-preview-server.pid
          fi

      - name: List screenshot + raster output
        if: always()
        run: |
          echo "=== client 截图 (近景 / 真游戏画面) ==="
          ls -la client/run/screenshots/ 2>/dev/null || echo "screenshots/ 不存在"
          find client/run -name "preview-*.png" -ls 2>/dev/null || true
          echo ""
          echo "=== worldgen raster PNG (顶视全图 / 大尺度) ==="
          find worldgen/generated -name "*-preview.png" -ls 2>/dev/null | head -30 || true

      - name: Upload screenshot + raster artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldgen-snapshot-${{ github.event.pull_request.number || github.run_id }}
          # 双轨：client 真游戏画面 + worldgen raster 顶视大全图
          # raster PNG 包含：
          #   focus-{layout,surface,height}-preview.png  — 蓝图全图聚焦视
          #   {layout,surface,height}-preview.png        — 整张地图大全景
          #   zone-<name>-{layout,surface,height}-preview.png  — 每个 zone 顶视
          # 一次跑产 30+ 张 PNG，看 zone 布局 / 山脉 / 灵气分布等大尺度信息
          path: |
            client/run/screenshots/preview-*.png
            worldgen/generated/**/*-preview.png
          if-no-files-found: warn

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bong-preview-server-log-${{ github.run_id }}
          path: /tmp/bong-preview-server.log
          if-no-files-found: ignore
