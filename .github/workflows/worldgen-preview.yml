name: Worldgen Preview Snapshot

# P0 + P1 + P2 完整版：worldgen 改动 / 手动触发 → 后台跑 server + xvfb headless
# client → client 截图 + worldgen raster PNG → compose_grid 拼图 → upload artifact
# + post_comment 在 PR 上发/编辑 [bong-snapshot] 评论。SSIM diff 留 v2 plan(需双
# ref 跑 + scikit-image)。

on:
  pull_request:
    paths:
      - "worldgen/**"
      - "server/zones*.json"
      - "client/src/main/java/com/bong/client/preview/**"
      - "client/preview-harness.json"
      - "server/src/preview/**"
      - "scripts/preview/**"
      - ".github/workflows/worldgen-preview.yml"
  workflow_dispatch: {}
  # P2 §3.4 占位:issue_comment @preview-worldgen 手动触发尚未实装(GH issue
  # comment trigger 需要专门 fork 处理 + collaborator 校验,留 v2 plan)。

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: worldgen-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/bong-target

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps (worldgen + compose_grid + validator)
        run: pip install numpy pillow

      - name: Unit tests — anvil_export + anvil_region_writer
        # plan-worldgen-anvil-export-v1 §1.4 + §2.4: 39 个饱和单测
        # 在 pipeline 跑前早跑，编码 / region 文件格式 bug 立即撞红
        working-directory: worldgen/scripts/terrain_gen
        run: |
          python3 -m unittest test_anvil_export -v
          python3 -m unittest test_anvil_region_writer -v

      - name: Unit tests — validate_snapshots
        # plan-worldgen-snapshot-v1 §4.3：validator 自身有饱和单测（31 个），
        # CI 早期跑保证规则不退化。失败 = validator bug，整个 workflow 应该红。
        run: python3 -m unittest discover -s scripts/preview -p 'test_*.py' -v

      - name: Run worldgen pipeline (raster + PNG previews + anvil world)
        # plan-worldgen-anvil-export-v1 §3.1：BACKEND=anvil 先跑 raster (PR #78
        # snapshot artifact 仍消费 PNG previews) 再跑 anvil_world_export 写
        # generated/snapshot/world/region/r.*.mca。server 启动设
        # BONG_WORLD_PATH=...generated/snapshot/world 走 AnvilIfPresent path,
        # iso ±400 视角拍到真实 (synthetic rolling hills) 起伏地形而不是 fallback
        # flat world 的 16×16 chunk 边界外纯虚空。
        #
        # focus-{layout,surface,height}-preview.png + zone-*-preview.png 仍正常产出。
        working-directory: worldgen
        run: bash pipeline.sh ../server/zones.worldview.example.json generated/snapshot anvil 128

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            /tmp/bong-target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-preview-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-preview-
            ${{ runner.os }}-cargo-

      - name: Cache Gradle / Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-preview-clean-v1-${{ hashFiles('client/build.gradle', 'client/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-preview-clean-v1-

      - name: Build server (release) — 让后续 cargo run 直接命中 cache
        working-directory: server
        run: cargo build --release

      - name: Start headless Bong server
        # BONG_PREVIEW_MODE=1 激活 preview module 的 !preview-tp 命令处理 +
        # ViewDistance(32) boost；不设的话 client 发命令 server 解析后 event
        # 不会被消费，5 角度都拍到 spawn 同一位置（fallback 行为）。
        #
        # BONG_WORLD_PATH 指 anvil_world_export 产出的 world dir
        # （plan-worldgen-anvil-export-v1 §3.1）。server/src/world/mod.rs 检查
        # region/ 下有 r.*.mca 文件 → AnvilIfPresent path → 加载真实地形覆盖
        # spawn ±400 blocks，让 plan-worldgen-snapshot-v1 iso 角度拍到地形而非
        # 16×16 fallback flat 边界外的虚空。
        env:
          BONG_PREVIEW_MODE: "1"
          BONG_WORLD_PATH: ${{ github.workspace }}/worldgen/generated/snapshot/world
        run: bash scripts/preview/run-server-headless.sh --release --timeout 120

      - name: Run Fabric client headless (xvfb + preview harness)
        working-directory: client
        env:
          BONG_PREVIEW_HARNESS: "1"
          BONG_PREVIEW_CONFIG: ${{ github.workspace }}/client/preview-harness.json
        # xvfb-run 自带 -a 抢未用 :N display；mesa llvmpipe 自动接管 OpenGL。
        # client.scheduleStop() 由 PreviewSession 拍完照后调用退出；workflow
        # timeout-minutes 兜底防止 mod 状态机卡住。
        # 不复用 client/.gradle 任务状态：Loom dev runtime 曾从缓存带入已删除
        # mixin 类，导致 preview client world 初始化前崩在 stale Mixin 校验。
        run: |
          ./gradlew clean --no-daemon
          xvfb-run -a --server-args='-screen 0 1280x720x24' \
            ./gradlew runClientPreview --no-daemon --stacktrace --rerun-tasks

      - name: Stop server (cleanup)
        if: always()
        run: |
          if [ -f /tmp/bong-preview-server.pid ]; then
            PID=$(cat /tmp/bong-preview-server.pid)
            kill -TERM "$PID" 2>/dev/null || true
            rm -f /tmp/bong-preview-server.pid
          fi

      - name: List screenshot + raster output
        if: always()
        run: |
          echo "=== client 截图 (近景 / 真游戏画面) ==="
          ls -la client/run/screenshots/ 2>/dev/null || echo "screenshots/ 不存在"
          find client/run -name "preview-*.png" -ls 2>/dev/null || true
          echo ""
          echo "=== worldgen raster PNG (顶视全图 / 大尺度) ==="
          find worldgen/generated -name "*-preview.png" -ls 2>/dev/null | head -30 || true

      - name: Validate snapshot content (R1 terrain% / R2 hash 唯一 / R3 size)
        # plan §4.1 内容验收闸：CI 不再只看"截图文件存在"就 pass，必须按色彩
        # 分类核验图像内容。若 R1/R2/R3 任一红，本 step 失败但不阻塞后续
        # compose_grid + upload-artifact —— artifact 仍要上传给排错（让人眼
        # 也能看到失败截图）。
        id: validate
        if: always()
        run: |
          python3 scripts/preview/validate_snapshots.py \
            --client-dir client/run/screenshots \
            --require-min-count 5

      - name: Compose grid PNG (5 client 角度 + raster 拼图总览)
        if: always()
        run: |
          python3 scripts/preview/compose_grid.py \
            --client-dir client/run/screenshots \
            --raster-dir worldgen/generated/snapshot \
            --out client/run/screenshots/preview-grid.png

      - name: Upload screenshot + raster + grid artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldgen-snapshot-${{ github.event.pull_request.number || github.run_id }}
          # 三类内容：
          #   client/run/screenshots/preview-grid.png  — compose_grid 拼图总览
          #   client/run/screenshots/preview-*.png     — 5 角度 client 真画面截图
          #   worldgen/generated/**/*-preview.png      — 30+ raster 顶视图
          path: |
            client/run/screenshots/preview-grid.png
            client/run/screenshots/preview-*.png
            worldgen/generated/**/*-preview.png
          if-no-files-found: warn

      - name: Post / edit PR comment with snapshot link
        # 仅 pull_request 触发时发评论（workflow_dispatch 没 PR# 跳过）
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/preview/post_comment.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --run-id "${{ github.run_id }}" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --artifact-name "worldgen-snapshot-${{ github.event.pull_request.number }}"

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bong-preview-server-log-${{ github.run_id }}
          path: /tmp/bong-preview-server.log
          if-no-files-found: ignore
