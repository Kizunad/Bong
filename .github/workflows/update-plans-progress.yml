name: Update Plans Progress

on:
  push:
    branches:
      - main
    paths:
      - "docs/plan-*.md"
      - "docs/plans-skeleton/plan-*.md"
      - "docs/finished_plans/plan-*.md"
      - "docs/plans-progress.yaml"
      - "scripts/plans_progress.py"
      - ".github/workflows/update-plans-progress.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plans-progress
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Render README progress section
        run: python3 scripts/plans_progress.py

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "README.md already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "$(cat <<'EOF'
          chore(readme): auto-update plan progress

          Regenerated by scripts/plans_progress.py from docs/plans-progress.yaml.
          EOF
          )"
          git push
