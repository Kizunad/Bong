category = "misc"
grid_w = 1
grid_h = 1
base_weight = 1.5
rarity = "rare"
spirit_quality_initial = 0.3
description = "古遗迹宝箱或血谷深层偶得。密度极高，天外坠落时裹入微量灵气，适合作剑胚骨架。"

[[item]]
id = "star_iron"
name = "星辰铁"
category = "misc"
grid_w = 1
grid_h = 1
base_weight = 2.0
rarity = "epic"
spirit_quality_initial = 0.5
description = "黑武士掉落或古遗迹核心深处才能觅得。铁色泛蓝光，据说是上古宗门从天劫残雷中淬炼。"

[[item]]
id = "sky_meteor_iron"
