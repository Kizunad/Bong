# plan-sword-path-v1 P1：剑道炼器原材料。
# 获取方式见 P2（巨剑沧海地形）和 P3（黑武士 BOSS）。

# ─── 金属系 ───────────────────────────────────────────────────────────────
[[item]]
id = "refined_iron"
name = "精铁"
category = "misc"
grid_w = 1
grid_h = 1
base_weight = 0.8
rarity = "common"
spirit_quality_initial = 0.0
description = "铁锭反复锻打提纯所得。凡物，不含灵气，但密度高于普通铁。"


[[item]]
id = "meteor_iron"
