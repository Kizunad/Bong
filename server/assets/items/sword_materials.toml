grid_h = 1
base_weight = 2.5
rarity = "legendary"
spirit_quality_initial = 0.8
description = "天劫雷击点偶现的陨铁碎片，或巨剑沧海极深处的原始矿脉。铸化虚灵剑的唯一骨料。"

