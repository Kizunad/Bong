spirit_quality_initial = 0.7
description = "灵泉水五份浓缩而成。通灵级灵剑淬火必备，凡水淬不住那个温度。"

# ─── 剑胚系 ───────────────────────────────────────────────────────────────
[[item]]
id = "sword_embryo_shard"
name = "剑胚残片"
category = "misc"
