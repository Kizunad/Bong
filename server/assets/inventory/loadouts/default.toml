# 末法残土 · 醒灵期散修起手装备。
# plan-backpack-equip-v1 P2 — 新布局：贴身口袋 2×3（固定）+ 破草包 3×3（装备）。
# worldview §四：「你唯一的优势是会死很多次」—— 起手装备简陋实用，
# 仅一颗保命丹、一颗辅修丹、几片草药、7 枚骨币、一根骨刺自卫。
# 所有 template_id 必须在 server/assets/items/*.toml 已注册且有对应 client PNG。

max_weight = 23.0

bone_coins = 7

# ─── 贴身口袋 2×3（固定，不可卸） ──────────────────────────────────────────
[[containers]]
id = "body_pocket"
name = "贴身口袋"
rows = 2
cols = 3

  [[containers.items]]
  row = 0
  col = 0
  template_id = "ningmai_powder"
  stack_count = 1

  [[containers.items]]
  row = 0
  col = 1
  template_id = "fengling_bone_coin"
  stack_count = 5

# ─── 背部破草包 3×3（装备产生的容器） ────────────────────────────────────────
[[containers]]
id = "back_pack"
name = "破草包"
rows = 3
cols = 3

  [[containers.items]]
  row = 0
  col = 0
  template_id = "spirit_grass"
  stack_count = 3

  [[containers.items]]
  row = 0
  col = 1
  template_id = "ningmai_powder"
  stack_count = 2

  [[containers.items]]
  row = 0
  col = 2
  template_id = "guyuan_pill"
  stack_count = 1

  [[containers.items]]
  row = 1
  col = 0
  template_id = "bone_spike"
  stack_count = 1

  [[containers.items]]
  row = 1
  col = 1
  template_id = "ash_spider_silk"
  stack_count = 1

  # bone_spike 占 1×2，row 1-2 col 0 均被占用，种子放 col 1-2
  [[containers.items]]
  row = 2
  col = 1
  template_id = "ci_she_hao_seed"
  stack_count = 4

  [[containers.items]]
  row = 2
  col = 2
  template_id = "ning_mai_cao_seed"
  stack_count = 4

# ─── 装备 ─────────────────────────────────────────────────────────────────
[[equip]]
slot = "back_pack"
template_id = "worn_grass_pouch"
durability = 0.3

[[equip]]
slot = "chest"
template_id = "fake_spirit_hide"
durability = 0.7

[[equip]]
slot = "main_hand"
template_id = "iron_sword"
durability = 0.5

# ─── 战斗 hotbar ─────────────────────────────────────────────────────────
[[hotbar]]
index = 0
template_id = "ningmai_powder"
