<?xml version="1.0" encoding="UTF-8"?>
<!--
  plan-hotbar-modify-v1 · UI mockup
  设计稿尺寸 800x540（owo-lib 容器内最终走 FlowLayout，PNG 图标走 DrawContext）。
  五区联动：功法+技艺列表 / 功法详情 / 经脉缩略图 / 全局状态 / 1-9 战斗 Hotbar。
  色板对齐 client.combat.inspect.TechniquesListPanel.Grade + MeridianChannel.baseColor。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'PingFang SC', 'Noto Sans CJK SC', monospace" font-size="12">

  <!-- ================== 全局背景 ================== -->
  <rect x="0" y="0" width="800" height="540" fill="#181818"/>
  <rect x="6" y="6" width="788" height="528" fill="#1f1f23" stroke="#3a3a3a" stroke-width="1"/>

  <!-- ================== 顶部 Tab 条 ================== -->
  <g id="tab-bar" transform="translate(20,18)">
    <text x="0"   y="14" fill="#8a8a8a">装备</text>
    <text x="40"  y="14" fill="#8a8a8a">修仙</text>
    <text x="80"  y="14" fill="#8a8a8a">技艺</text>
    <text x="120" y="14" fill="#FFE080" font-weight="bold">战斗 · 修炼</text>
    <line x1="120" y1="20" x2="200" y2="20" stroke="#FFE080" stroke-width="1.5"/>
    <text x="600" y="14" fill="#9a9a9a" text-anchor="start">境界</text>
    <text x="640" y="14" fill="#80C0FF" font-weight="bold">凝脉一层</text>
    <text x="720" y="14" fill="#9a9a9a">XP</text>
    <rect x="745" y="6" width="40" height="10" fill="#2a2a2a" stroke="#3a3a3a"/>
    <rect x="745" y="6" width="26" height="10" fill="#80C0FF" opacity="0.8"/>
  </g>

  <line x1="20" y1="44" x2="780" y2="44" stroke="#3a3a3a"/>

  <!-- ================== 主区上半 · 左：功法+技艺列表 ================== -->
  <g id="list-panel" transform="translate(20,56)">
    <rect x="0" y="0" width="380" height="240" fill="#202024" stroke="#2c2c30"/>

    <!-- 标题 + 筛选 -->
    <text x="10" y="16" fill="#e0e0e0" font-weight="bold">已学 · 拖至下方 Hotbar 绑定</text>
    <g transform="translate(232,8)" font-size="10">
      <rect x="0"  y="0" width="36" height="14" fill="#FFE080" opacity="0.18" stroke="#FFE080" stroke-opacity="0.5"/>
      <text x="18" y="10" fill="#FFE080" text-anchor="middle">全部</text>
      <rect x="40" y="0" width="36" height="14" fill="#2a2a2a"/>
      <text x="58" y="10" fill="#9a9a9a" text-anchor="middle">功法</text>
      <rect x="80" y="0" width="36" height="14" fill="#2a2a2a"/>
      <text x="98" y="10" fill="#9a9a9a" text-anchor="middle">技艺</text>
      <text x="120" y="10" fill="#666">▾</text>
      <text x="135" y="10" fill="#7a7a7a">境界</text>
    </g>

    <line x1="10" y1="24" x2="370" y2="24" stroke="#2c2c30"/>

    <!-- 段头：功法 -->
    <text x="10" y="40" fill="#80C0FF" font-size="10" font-weight="bold">─ 功法 ─</text>

    <!-- 功法 1：崩拳（选中态） -->
    <g transform="translate(8,48)">
      <rect x="0" y="0" width="364" height="32" fill="#2a2a32" stroke="#FFE080" stroke-width="1.5"/>
      <rect x="6" y="6" width="20" height="20" fill="#3a2a1a" stroke="#FFE080" stroke-opacity="0.5"/>
      <text x="16" y="20" fill="#FFE080" text-anchor="middle" font-size="10">崩</text>
      <text x="34" y="14" fill="#FFE080" font-weight="bold">崩拳</text>
      <text x="76" y="14" fill="#FFE080" opacity="0.7" font-size="10">黄阶</text>
      <text x="110" y="14" fill="#9a9a9a" font-size="10">已掌握 0.85</text>
      <rect x="34" y="20" width="200" height="4" fill="#2a2a2a"/>
      <rect x="34" y="20" width="170" height="4" fill="#FFE080"/>
      <text x="320" y="20" fill="#888" font-size="10">需臂三阳</text>
    </g>

    <!-- 功法 2：贴山靠 -->
    <g transform="translate(8,84)">
      <rect x="0" y="0" width="364" height="32" fill="#23232a"/>
      <rect x="6" y="6" width="20" height="20" fill="#2a2a32"/>
      <text x="16" y="20" fill="#FFE080" text-anchor="middle" font-size="10">靠</text>
      <text x="34" y="14" fill="#dcdcdc">贴山靠</text>
      <text x="76" y="14" fill="#FFE080" opacity="0.7" font-size="10">黄阶</text>
      <text x="110" y="14" fill="#9a9a9a" font-size="10">已掌握 0.62</text>
      <rect x="34" y="20" width="200" height="4" fill="#2a2a2a"/>
      <rect x="34" y="20" width="124" height="4" fill="#FFE080"/>
      <text x="320" y="20" fill="#888" font-size="10">任督</text>
    </g>

    <!-- 功法 3：血崩步（境界锁） -->
    <g transform="translate(8,120)">
      <rect x="0" y="0" width="364" height="32" fill="#23232a"/>
      <rect x="6" y="6" width="20" height="20" fill="#2a2a32" opacity="0.4"/>
      <text x="16" y="20" fill="#80C0FF" text-anchor="middle" font-size="10" opacity="0.4">步</text>
      <text x="34" y="14" fill="#666">血崩步</text>
      <text x="76" y="14" fill="#80C0FF" opacity="0.4" font-size="10">玄阶</text>
      <text x="110" y="14" fill="#666" font-size="10">境界 不足 (需 凝脉三层)</text>
      <rect x="34" y="20" width="200" height="4" fill="#2a2a2a"/>
      <rect x="34" y="20" width="60" height="4" fill="#666"/>
      <text x="320" y="20" fill="#CC4466" font-size="10">🔒 锁</text>
    </g>

    <!-- 功法 4：逆脉护体（toggle 激活） -->
    <g transform="translate(8,156)">
      <rect x="0" y="0" width="364" height="32" fill="#23232a"/>
      <rect x="6" y="6" width="20" height="20" fill="#2a3a2a" stroke="#66AA88"/>
      <text x="16" y="20" fill="#66AA88" text-anchor="middle" font-size="10">逆</text>
      <text x="34" y="14" fill="#dcdcdc">逆脉护体</text>
      <text x="76" y="14" fill="#FFE080" opacity="0.7" font-size="10">黄阶</text>
      <text x="110" y="14" fill="#66AA88" font-size="10">⊙ 维持中</text>
      <rect x="34" y="20" width="200" height="4" fill="#2a2a2a"/>
      <rect x="34" y="20" width="180" height="4" fill="#FFE080"/>
      <text x="320" y="20" fill="#888" font-size="10">手太阴</text>
    </g>

    <!-- 段头：技艺 -->
    <line x1="10" y1="196" x2="370" y2="196" stroke="#2c2c30"/>
    <text x="10" y="208" fill="#80C0FF" font-size="10" font-weight="bold">─ 技艺 ─</text>
    <text x="280" y="208" fill="#7a7a7a" font-size="10">不可入战斗 Hotbar</text>

    <!-- 技艺：HERB / ALCH / FORG 紧凑三行 -->
    <g transform="translate(8,214)" font-size="10">
      <text x="0"   y="9" fill="#bbb">采药</text>
      <rect x="40"  y="2" width="80" height="8" fill="#2a2a2a"/>
      <rect x="40"  y="2" width="24" height="8" fill="#66AA88"/>
      <text x="125" y="9" fill="#9a9a9a">lv2 · 30%</text>

      <text x="180" y="9" fill="#bbb">炼丹</text>
      <rect x="220" y="2" width="80" height="8" fill="#2a2a2a"/>
      <rect x="220" y="2" width="48" height="8" fill="#66AA88"/>
      <text x="305" y="9" fill="#9a9a9a">lv4 · 60%</text>

      <text x="0"   y="22" fill="#bbb">锻造</text>
      <rect x="40"  y="15" width="80" height="8" fill="#2a2a2a"/>
      <rect x="40"  y="15" width="0"  height="8" fill="#66AA88"/>
      <text x="125" y="22" fill="#9a9a9a">lv1 · 0%</text>
    </g>
  </g>

  <!-- ================== 主区上半 · 右：功法详情卡 ================== -->
  <g id="detail-panel" transform="translate(412,56)">
    <rect x="0" y="0" width="368" height="240" fill="#202024" stroke="#2c2c30"/>

    <!-- 头部：图标 + 名称 + 阶 -->
    <rect x="10" y="10" width="40" height="40" fill="#3a2a1a" stroke="#FFE080"/>
    <text x="30" y="36" fill="#FFE080" text-anchor="middle" font-size="20" font-weight="bold">崩</text>
    <text x="58" y="22" fill="#FFE080" font-size="16" font-weight="bold">崩拳</text>
    <text x="58" y="38" fill="#FFE080" opacity="0.7" font-size="11">黄阶 · 已掌握 0.85</text>
    <text x="58" y="50" fill="#9a9a9a" font-size="10">id: burst_meridian.beng_quan</text>

    <line x1="10" y1="58" x2="358" y2="58" stroke="#2c2c30"/>

    <!-- 描述 -->
    <text x="10" y="74" fill="#dcdcdc" font-size="11" font-weight="bold">描述</text>
    <text x="10" y="90"  fill="#bbb" font-size="10">零距灌真元 · 起手即出招，</text>
    <text x="10" y="104" fill="#bbb" font-size="10">不需挥臂蓄力，反震劲走任督。</text>

    <!-- 需求 -->
    <text x="10" y="124" fill="#dcdcdc" font-size="11" font-weight="bold">需求</text>
    <text x="10" y="138" fill="#bbb" font-size="10">· 境界 ≥ 醒灵</text>
    <text x="10" y="150" fill="#bbb" font-size="10">· 经脉 手阳明大肠经 (LI) ─ 健康</text>
    <text x="10" y="162" fill="#bbb" font-size="10">· 经脉 手少阳三焦经 (TE) ─ 健康</text>

    <!-- 数值 -->
    <text x="200" y="74" fill="#dcdcdc" font-size="11" font-weight="bold">招式</text>
    <text x="200" y="90"  fill="#9a9a9a" font-size="10">真元消耗</text>
    <text x="358" y="90"  fill="#88BBDD" font-size="10" text-anchor="end">30 / 360</text>
    <text x="200" y="104" fill="#9a9a9a" font-size="10">前摇 cast</text>
    <text x="358" y="104" fill="#dcdcdc" font-size="10" text-anchor="end">8 ticks (0.4s)</text>
    <text x="200" y="118" fill="#9a9a9a" font-size="10">冷却</text>
    <text x="358" y="118" fill="#dcdcdc" font-size="10" text-anchor="end">60 ticks (3.0s)</text>
    <text x="200" y="132" fill="#9a9a9a" font-size="10">射程</text>
    <text x="358" y="132" fill="#dcdcdc" font-size="10" text-anchor="end">近身 1.8m</text>
    <text x="200" y="146" fill="#9a9a9a" font-size="10">伤害类型</text>
    <text x="358" y="146" fill="#CC4466" font-size="10" text-anchor="end">爆破 · 反震</text>

    <!-- 已绑定提示 -->
    <line x1="10" y1="178" x2="358" y2="178" stroke="#2c2c30"/>
    <rect x="10" y="186" width="348" height="44" fill="#2a2a32" stroke="#FFE080" stroke-opacity="0.3"/>
    <text x="20" y="202" fill="#FFE080" font-size="11">▶ 已绑定槽位 1（按数字键直接出招）</text>
    <text x="20" y="218" fill="#9a9a9a" font-size="10">点击下方槽位 = 切换 / 拖出 = 解除绑定 / 右键 = 清空</text>
  </g>

  <!-- ================== 主区下半 · 左：经脉缩略图 ================== -->
  <g id="meridian-mini" transform="translate(20,308)">
    <rect x="0" y="0" width="380" height="156" fill="#202024" stroke="#2c2c30"/>
    <text x="10" y="16" fill="#e0e0e0" font-weight="bold">经脉视图 · 高亮当前功法所需</text>
    <text x="220" y="16" fill="#7a7a7a" font-size="10">12 正经 + 8 奇经 = 20 条</text>

    <!-- 简化人体剪影 -->
    <g transform="translate(110,28)" stroke="#666" fill="none" stroke-width="1.2">
      <!-- head -->
      <circle cx="64" cy="14" r="11" stroke="#9a9a9a"/>
      <!-- torso -->
      <path d="M 50 26 L 78 26 L 80 80 L 48 80 Z" stroke="#9a9a9a"/>
      <!-- left arm（手三阴） -->
      <path d="M 50 30 Q 30 50 28 100" stroke="#88BBDD" stroke-width="2"/>
      <!-- right arm（手三阳 — 高亮：崩拳所需） -->
      <path d="M 78 30 Q 98 50 100 100" stroke="#FFE080" stroke-width="2.6"/>
      <circle cx="100" cy="100" r="3" fill="#FFE080"/>
      <!-- left leg -->
      <path d="M 56 80 L 50 132" stroke="#9a9a9a" stroke-width="1.2"/>
      <!-- right leg -->
      <path d="M 72 80 L 78 132" stroke="#9a9a9a" stroke-width="1.2"/>
      <!-- 任脉前正中 -->
      <line x1="64" y1="26" x2="64" y2="80" stroke="#44AACC" stroke-dasharray="2 2"/>
    </g>

    <!-- 高亮经脉 legend -->
    <g transform="translate(252,32)" font-size="10">
      <rect x="0" y="2" width="10" height="6" fill="#FFE080"/>
      <text x="14" y="9" fill="#FFE080">手阳明大肠经 LI</text>
      <text x="100" y="9" fill="#66AA88">健康</text>

      <rect x="0" y="20" width="10" height="6" fill="#FFE080"/>
      <text x="14" y="27" fill="#FFE080">手少阳三焦经 TE</text>
      <text x="100" y="27" fill="#66AA88">健康</text>

      <rect x="0" y="38" width="10" height="6" fill="#88BBDD" opacity="0.6"/>
      <text x="14" y="45" fill="#888">手太阴肺经 LU</text>
      <text x="100" y="45" fill="#888">无关</text>

      <rect x="0" y="56" width="10" height="6" fill="#44AACC" opacity="0.6"/>
      <text x="14" y="63" fill="#888">任脉 REN</text>
      <text x="100" y="63" fill="#888">无关</text>

      <line x1="0" y1="80" x2="120" y2="80" stroke="#2c2c30"/>
      <text x="0" y="94" fill="#9a9a9a">污染度 0.12 / 1.00</text>
      <rect x="0" y="100" width="120" height="6" fill="#2a2a2a"/>
      <rect x="0" y="100" width="14"  height="6" fill="#CC4466"/>
      <text x="0" y="120" fill="#7a7a7a" font-size="9">点 [详情] 切到 修仙·tab 查看完整 20 经</text>
    </g>
  </g>

  <!-- ================== 主区下半 · 右：全局状态 / 真元 / 因果 ================== -->
  <g id="global-status" transform="translate(412,308)">
    <rect x="0" y="0" width="368" height="156" fill="#202024" stroke="#2c2c30"/>
    <text x="10" y="16" fill="#e0e0e0" font-weight="bold">修士状态</text>

    <!-- 真元 -->
    <text x="10" y="42" fill="#88BBDD" font-size="11">真元</text>
    <rect x="10"  y="48" width="348" height="10" fill="#2a2a2a"/>
    <rect x="10"  y="48" width="270" height="10" fill="#88BBDD"/>
    <text x="354" y="56" fill="#dcdcdc" font-size="10" text-anchor="end">280 / 360</text>

    <!-- 体力 -->
    <text x="10" y="76" fill="#CC8855" font-size="11">体力</text>
    <rect x="10"  y="82" width="348" height="10" fill="#2a2a2a"/>
    <rect x="10"  y="82" width="320" height="10" fill="#CC8855"/>
    <text x="354" y="90" fill="#dcdcdc" font-size="10" text-anchor="end">92 / 100</text>

    <!-- 因果 -->
    <text x="10" y="110" fill="#9a9a9a" font-size="10">因果</text>
    <text x="50"  y="110" fill="#66AA88" font-size="10" font-weight="bold">+0.32</text>
    <text x="120" y="110" fill="#9a9a9a" font-size="10">综合实力</text>
    <text x="180" y="110" fill="#FFE080" font-size="10" font-weight="bold">1240</text>
    <text x="240" y="110" fill="#9a9a9a" font-size="10">区域</text>
    <text x="270" y="110" fill="#80C0FF" font-size="10">青云脉</text>

    <line x1="10" y1="120" x2="358" y2="120" stroke="#2c2c30"/>
    <text x="10"  y="136" fill="#7a7a7a" font-size="10">F1–F9 物品快捷使用栏 = 上层 (现网保留)</text>
    <text x="10"  y="148" fill="#7a7a7a" font-size="10">1–9 战斗技能栏 = 下层 (本 plan 新增，见下)</text>
  </g>

  <!-- ================== 底部：1-9 战斗 Hotbar (拖目标) ================== -->
  <g id="hotbar" transform="translate(20,476)">
    <rect x="0" y="0" width="760" height="48" fill="#1a1a1c" stroke="#FFE080" stroke-opacity="0.3" stroke-dasharray="3 2"/>

    <text x="10" y="14" fill="#FFE080" font-size="10" font-weight="bold">1–9 战斗技能栏</text>
    <text x="120" y="14" fill="#7a7a7a" font-size="10">拖入功法 = 绑技能 · 拖入物品 = server-driven 切手持 · 右键 = 清空</text>

    <!-- 槽位 -->
    <g font-size="11" transform="translate(10,18)">
      <!-- slot 1：崩拳 -->
      <rect x="0" y="0" width="40" height="26" fill="#3a2a1a" stroke="#FFE080" stroke-width="1.4"/>
      <text x="3" y="8" fill="#FFE080" font-size="9">1</text>
      <text x="20" y="20" fill="#FFE080" text-anchor="middle" font-size="11" font-weight="bold">崩</text>

      <!-- slot 2：贴山靠（绑定 + 冷却中蒙灰） -->
      <rect x="44" y="0" width="40" height="26" fill="#2a2a32" stroke="#FFE080" stroke-opacity="0.5"/>
      <text x="47" y="8" fill="#FFE080" font-size="9">2</text>
      <text x="64" y="20" fill="#dcdcdc" text-anchor="middle">靠</text>
      <rect x="44" y="0" width="40" height="26" fill="#000" opacity="0.55"/>
      <text x="64" y="18" fill="#fff" text-anchor="middle" font-size="9">2.1s</text>

      <!-- slot 3：逆脉护体（toggle on，绿色描边） -->
      <rect x="88" y="0" width="40" height="26" fill="#2a3a2a" stroke="#66AA88" stroke-width="1.4"/>
      <text x="91" y="8" fill="#66AA88" font-size="9">3</text>
      <text x="108" y="20" fill="#66AA88" text-anchor="middle">逆</text>
      <circle cx="123" cy="4" r="2.5" fill="#66AA88"/>

      <!-- slot 4：背包物品（剑 — server-driven） -->
      <rect x="132" y="0" width="40" height="26" fill="#23232a" stroke="#80C0FF" stroke-opacity="0.4"/>
      <text x="135" y="8" fill="#80C0FF" font-size="9">4</text>
      <text x="152" y="20" fill="#80C0FF" text-anchor="middle" font-size="10">剑</text>

      <!-- slot 5：空 -->
      <rect x="176" y="0" width="40" height="26" fill="#1a1a1c" stroke="#3a3a3a" stroke-dasharray="2 2"/>
      <text x="179" y="8" fill="#666" font-size="9">5</text>

      <!-- slot 6：空 -->
      <rect x="220" y="0" width="40" height="26" fill="#1a1a1c" stroke="#3a3a3a" stroke-dasharray="2 2"/>
      <text x="223" y="8" fill="#666" font-size="9">6</text>

      <!-- slot 7：空 -->
      <rect x="264" y="0" width="40" height="26" fill="#1a1a1c" stroke="#3a3a3a" stroke-dasharray="2 2"/>
      <text x="267" y="8" fill="#666" font-size="9">7</text>

      <!-- slot 8：空 -->
      <rect x="308" y="0" width="40" height="26" fill="#1a1a1c" stroke="#3a3a3a" stroke-dasharray="2 2"/>
      <text x="311" y="8" fill="#666" font-size="9">8</text>

      <!-- slot 9：空（拖拽 hover 高亮） -->
      <rect x="352" y="0" width="40" height="26" fill="#3a2a1a" stroke="#FFE080" stroke-width="1.6" stroke-dasharray="3 2"/>
      <text x="355" y="8" fill="#FFE080" font-size="9">9</text>
      <text x="372" y="20" fill="#FFE080" text-anchor="middle" font-size="9">＋</text>

      <!-- 分隔 -->
      <line x1="404" y1="-4" x2="404" y2="30" stroke="#3a3a3a"/>

      <!-- F1–F9 镜像（只读提示） -->
      <text x="412" y="-4" fill="#7a7a7a" font-size="9">F1–F9 上层 · 物品快捷</text>
      <g opacity="0.55">
        <rect x="412" y="0" width="32" height="26" fill="#23232a"/>
        <text x="415" y="8" fill="#80C0FF" font-size="9">F1</text>
        <text x="428" y="20" fill="#80C0FF" text-anchor="middle" font-size="9">丹</text>

        <rect x="448" y="0" width="32" height="26" fill="#23232a"/>
        <text x="451" y="8" fill="#80C0FF" font-size="9">F2</text>
        <text x="464" y="20" fill="#80C0FF" text-anchor="middle" font-size="9">绷</text>

        <rect x="484" y="0" width="32" height="26" fill="#1a1a1c" stroke="#3a3a3a" stroke-dasharray="2 2"/>
        <text x="487" y="8" fill="#666" font-size="9">F3</text>

