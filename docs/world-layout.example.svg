<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">末法残土地图示例</title>
  <desc id="desc">基于 docs/worldview.md 的俯视地图示意图，用于 worldgen 蓝图和区域布局讨论。</desc>

  <defs>
    <!-- grid -->
    <pattern id="grid" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M 84 0 L 0 0 0 84" fill="none" stroke="#e2e8f0" stroke-width="0.6" />
    </pattern>

    <!-- zone shadows (soft drop shadow for light bg) -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.1" />
    </filter>
    <filter id="shadow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.15" />
    </filter>
    <filter id="neg-pulse" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feFlood flood-color="#7c3aed" flood-opacity="0.3" result="c" />
      <feComposite in="c" in2="b" operator="in" result="d" />
      <feMerge><feMergeNode in="d" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- zone radial gradients (brighter for white bg) -->
    <radialGradient id="rg-spawn" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.5" />
    </radialGradient>
    <radialGradient id="rg-peak" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#78909c" stop-opacity="0.55" />
    </radialGradient>
    <radialGradient id="rg-marsh" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.55" />
    </radialGradient>
    <radialGradient id="rg-blood" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.6" />
    </radialGradient>
    <radialGradient id="rg-cave" cx="55%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.5" />
    </radialGradient>
    <radialGradient id="rg-waste" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4d4d8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#a1a1aa" stop-opacity="0.5" />
    </radialGradient>

    <!-- negative pressure gradient -->
    <radialGradient id="rg-neg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0" />
    </radialGradient>

    <!-- path marker -->
    <marker id="dot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="5" markerHeight="5">
      <circle cx="3" cy="3" r="2.5" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="980" fill="#fafbfc" />

  <!-- main map area -->
  <g transform="translate(70 60)">
    <!-- map frame -->
    <rect x="0" y="0" width="840" height="840" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />
    <rect x="0" y="0" width="840" height="840" rx="18" fill="url(#grid)" opacity="0.6" />

    <!-- axis lines -->
    <path d="M 420 20 L 420 820" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="6 10" />
    <path d="M 20 420 L 820 420" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="6 10" />

    <!-- world bounds label -->
    <text x="12" y="24" fill="#94a3b8" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11" letter-spacing="0.5">世界范围 ±10 000 格</text>

    <!-- ═══════════ PATHS (behind zones) ═══════════ -->

    <!-- spawn → qingyun_peaks  古径 ~3600 -->
    <path d="M 410 400 C 370 370 330 340 294 316" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="8 6" fill="none" opacity="0.6" marker-end="url(#dot)" />
    <text x="338" y="368" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" transform="rotate(-32 338 368)">古径 3.6k</text>

    <!-- spawn → lingquan_marsh  湿路 ~3500 -->
    <path d="M 400 440 C 370 470 340 500 315 520" stroke="#6ee7b7" stroke-width="1.6" stroke-dasharray="8 6" fill="none" opacity="0.5" marker-end="url(#dot)" />
    <text x="344" y="492" fill="#059669" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" transform="rotate(32 344 492)">湿路 3.5k</text>

    <!-- spawn → blood_valley  裂道 ~3900 -->
    <path d="M 440 400 C 470 370 510 340 546 315" stroke="#fca5a5" stroke-width="1.6" stroke-dasharray="8 6" fill="none" opacity="0.5" marker-end="url(#dot)" />
    <text x="485" y="365" fill="#dc2626" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" transform="rotate(-28 485 365)">裂道 3.9k</text>

    <!-- spawn → youan_depths  穴路 ~3600 -->
    <path d="M 440 440 C 460 470 480 510 504 540" stroke="#a5b4fc" stroke-width="1.6" stroke-dasharray="8 6" fill="none" opacity="0.5" marker-end="url(#dot)" />
    <text x="468" y="500" fill="#4f46e5" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" transform="rotate(38 468 500)">穴路 3.6k</text>

    <!-- spawn → north_wastes  长流路 ~7000 -->
    <path d="M 420 380 C 420 300 420 220 420 148" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="4 8" fill="none" opacity="0.45" marker-end="url(#dot)" />
    <text x="432" y="264" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10">流放路 7.0k</text>

    <!-- ═══════════ ZONES ═══════════ -->

    <!-- ── 初醒原 (spawn) ── -->
    <g filter="url(#shadow-strong)">
      <ellipse cx="420" cy="420" rx="72" ry="64" fill="url(#rg-spawn)" stroke="#059669" stroke-width="1.8" />
    </g>
    <text x="420" y="412" text-anchor="middle" fill="#064e3b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="18" font-weight="700">初醒原</text>
    <text x="420" y="432" text-anchor="middle" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.30</text>
    <!-- danger badge -->
    <g transform="translate(472 380)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 1</text>
    </g>

    <!-- ── 青云残峰 (qingyun_peaks) ── -->
    <g filter="url(#shadow)">
      <path d="M 262 340 L 280 280 L 310 268 L 340 282 L 346 332 L 318 358 L 276 354 Z" fill="url(#rg-peak)" stroke="#64748b" stroke-width="1.5" />
    </g>
    <!-- mountain ribs -->
    <path d="M 290 295 L 300 278 L 310 292" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.45" />
    <path d="M 315 300 L 325 286 L 332 298" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.35" />
    <text x="305" y="312" text-anchor="middle" fill="#1e293b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="16" font-weight="700">青云残峰</text>
    <text x="305" y="330" text-anchor="middle" fill="#334155" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.50</text>
    <g transform="translate(334 270)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#334155" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 2</text>
    </g>

    <!-- ── 灵泉湿地 (lingquan_marsh) ── -->
    <g filter="url(#shadow)">
      <ellipse cx="315" cy="540" rx="56" ry="48" fill="url(#rg-marsh)" stroke="#0d9488" stroke-width="1.5" />
    </g>
    <!-- water ripples -->
    <ellipse cx="300" cy="548" rx="18" ry="6" fill="none" stroke="#0d9488" stroke-width="0.6" opacity="0.35" />
    <ellipse cx="330" cy="534" rx="12" ry="4" fill="none" stroke="#0d9488" stroke-width="0.6" opacity="0.25" />
    <text x="315" y="535" text-anchor="middle" fill="#064e3b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="16" font-weight="700">灵泉湿地</text>
    <text x="315" y="553" text-anchor="middle" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.70</text>
    <g transform="translate(352 502)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 3</text>
    </g>

    <!-- ── 血谷 (blood_valley) ── -->
    <g filter="url(#shadow)">
      <g transform="rotate(-20 546 310)">
        <rect x="518" y="274" width="56" height="72" rx="12" fill="url(#rg-blood)" stroke="#dc2626" stroke-width="1.5" />
      </g>
    </g>
    <!-- cracks -->
    <path d="M 540 290 L 544 308 L 538 320" fill="none" stroke="#dc2626" stroke-width="0.7" opacity="0.3" />
    <path d="M 555 295 L 552 310" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.25" />
    <text x="585" y="303" text-anchor="start" fill="#7f1d1d" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="16" font-weight="700">血谷</text>
    <text x="585" y="320" text-anchor="start" fill="#991b1b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.30</text>
    <g transform="translate(585 326)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#991b1b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 4</text>
    </g>

    <!-- ── 幽暗地穴 (youan_depths) ── -->
    <g filter="url(#shadow)">
      <ellipse cx="504" cy="552" rx="58" ry="48" fill="url(#rg-cave)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4" />
    </g>
    <!-- cave entrance dots -->
    <circle cx="484" cy="536" r="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.8" opacity="0.7" />
    <circle cx="518" cy="560" r="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.8" opacity="0.55" />
    <circle cx="496" cy="568" r="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.8" opacity="0.4" />
    <text x="504" y="548" text-anchor="middle" fill="#1e1b4b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="16" font-weight="700">幽暗地穴</text>
    <text x="504" y="566" text-anchor="middle" fill="#3730a3" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.20–0.80</text>
    <g transform="translate(544 516)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#3730a3" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 4</text>
    </g>

    <!-- ── 北荒 (north_wastes) ── -->
    <g filter="url(#shadow)">
      <rect x="348" y="80" width="144" height="96" rx="14" fill="url(#rg-waste)" stroke="#71717a" stroke-width="1.5" />
    </g>
    <!-- negative pressure patches -->
    <circle cx="395" cy="108" r="16" fill="url(#rg-neg)" filter="url(#neg-pulse)" opacity="0.7" />
    <circle cx="455" cy="138" r="20" fill="url(#rg-neg)" filter="url(#neg-pulse)" opacity="0.8" />
    <!-- patch labels -->
    <text x="395" y="112" text-anchor="middle" fill="#6d28d9" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="7" font-weight="600">-0.35</text>
    <text x="455" y="142" text-anchor="middle" fill="#6d28d9" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="7" font-weight="600">-0.55</text>
    <text x="420" y="116" text-anchor="middle" fill="#18181b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="18" font-weight="700">北荒</text>
    <text x="420" y="136" text-anchor="middle" fill="#3f3f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">灵气 0.05 · 负灵压斑块</text>
    <g transform="translate(472 84)">
      <rect x="0" y="0" width="28" height="16" rx="8" fill="#e4e4e7" stroke="#71717a" stroke-width="0.8" />
      <text x="14" y="12" text-anchor="middle" fill="#3f3f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" font-weight="600">危 5</text>
    </g>

    <!-- coord footnote -->
    <text x="0" y="866" fill="#9ca3af" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="11">北 = -Z · 南 = +Z · 东 = +X · 西 = -X</text>
  </g>

  <!-- ═══════════ COMPASS ROSE ═══════════ -->
  <g transform="translate(840 100)">
    <!-- outer ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#d1d5db" stroke-width="1" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="#e5e7eb" stroke-width="0.5" />
    <!-- N arrow -->
    <path d="M 0 -28 L 4 -8 L 0 -14 L -4 -8 Z" fill="#374151" />
    <!-- S arrow -->
    <path d="M 0 28 L 4 8 L 0 14 L -4 8 Z" fill="#d1d5db" />
    <!-- E/W ticks -->
    <path d="M -28 0 L -18 0" stroke="#d1d5db" stroke-width="1.5" />
    <path d="M 18 0 L 28 0" stroke="#d1d5db" stroke-width="1.5" />
    <!-- labels -->
    <text x="0" y="-34" text-anchor="middle" fill="#1f2937" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12" font-weight="700">北</text>
    <text x="0" y="44" text-anchor="middle" fill="#9ca3af" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10">南</text>
    <text x="38" y="4" text-anchor="middle" fill="#9ca3af" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10">东</text>
    <text x="-38" y="4" text-anchor="middle" fill="#9ca3af" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10">西</text>
  </g>

  <!-- ═══════════ LEGEND ═══════════ -->
  <g transform="translate(940 200)">
    <rect x="0" y="0" width="220" height="440" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="1" />

    <text x="18" y="32" fill="#1f2937" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="16" font-weight="700">图例</text>
    <path d="M 18 42 L 202 42" stroke="#e5e7eb" stroke-width="0.8" />

    <!-- zone types -->
    <text x="18" y="66" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" font-weight="600" letter-spacing="1">区域类型</text>

    <ellipse cx="30" cy="86" rx="10" ry="8" fill="#6ee7b7" stroke="#059669" stroke-width="0.6" />
    <text x="50" y="90" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">出生安全区</text>

    <rect x="20" y="104" width="20" height="14" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="0.6" />
    <text x="50" y="116" fill="#334155" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">残峰山地</text>

    <ellipse cx="30" cy="136" rx="10" ry="8" fill="#5eead4" stroke="#0d9488" stroke-width="0.6" />
    <text x="50" y="140" fill="#065f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">高灵气湿地</text>

    <rect x="22" y="152" width="16" height="18" rx="4" fill="#fca5a5" stroke="#dc2626" stroke-width="0.6" transform="rotate(-15 30 161)" />
    <text x="50" y="166" fill="#991b1b" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">裂谷冲突区</text>

    <ellipse cx="30" cy="188" rx="10" ry="8" fill="#a5b4fc" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="3 2" />
    <text x="50" y="192" fill="#3730a3" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">地下洞穴网络</text>

    <rect x="20" y="204" width="20" height="14" rx="4" fill="#d4d4d8" stroke="#71717a" stroke-width="0.6" />
    <text x="50" y="216" fill="#3f3f46" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">死域 / 荒原</text>

    <!-- separator -->
    <path d="M 18 234 L 202 234" stroke="#e5e7eb" stroke-width="0.8" />

    <!-- special markers -->
    <text x="18" y="254" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" font-weight="600" letter-spacing="1">特殊标记</text>

    <circle cx="30" cy="276" r="8" fill="url(#rg-neg)" stroke="#7c3aed" stroke-width="1" />
    <text x="50" y="280" fill="#5b21b6" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">负灵压斑块</text>

    <path d="M 18 298 L 42 298" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4" />
    <text x="50" y="302" fill="#4b5563" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">赶路路线 + 距离</text>

    <g transform="translate(20 314)">
      <rect x="0" y="0" width="24" height="14" rx="7" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.6" />
      <text x="12" y="11" text-anchor="middle" fill="#374151" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="8" font-weight="600">危 N</text>
    </g>
    <text x="50" y="326" fill="#4b5563" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="12">危险等级 1–5</text>

    <!-- separator -->
    <path d="M 18 346 L 202 346" stroke="#e5e7eb" stroke-width="0.8" />

    <!-- spirit qi scale -->
    <text x="18" y="366" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="10" font-weight="600" letter-spacing="1">灵气浓度</text>

    <rect x="18" y="378" width="184" height="10" rx="5" fill="#f3f4f6" />
    <rect x="18" y="378" width="184" height="10" rx="5" fill="none" stroke="#d1d5db" stroke-width="0.5" />
    <!-- gradient bar -->
    <rect x="19" y="379" width="26" height="8" rx="4" fill="#a78bfa" opacity="0.6" />
    <rect x="45" y="379" width="50" height="8" fill="#d4d4d8" opacity="0.5" />
    <rect x="95" y="379" width="50" height="8" fill="#6ee7b7" opacity="0.6" />
    <rect x="145" y="379" width="56" height="8" rx="4" fill="#2dd4bf" opacity="0.7" />
    <text x="18" y="402" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9">负压</text>
    <text x="70" y="402" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9">0.0</text>
    <text x="118" y="402" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9">0.3</text>
    <text x="182" y="402" fill="#6b7280" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9" text-anchor="end">0.7+</text>

    <!-- source note -->
    <text x="18" y="430" fill="#d1d5db" font-family="Noto Sans SC, Source Han Sans SC, sans-serif" font-size="9">zones.worldview.example.json</text>
  </g>
</svg>
