<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <pattern id="mcbg" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1a1a22"/>
      <rect width="40" height="40" fill="#222230" opacity="0.3"/>
      <circle cx="10" cy="10" r="0.8" fill="#333344"/>
      <circle cx="30" cy="25" r="0.6" fill="#2a2a38"/>
    </pattern>
    <pattern id="soil" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#4a3418"/>
      <circle cx="4" cy="5" r="1" fill="#6a4828"/>
      <circle cx="9" cy="9" r="1" fill="#3a2810"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#mcbg)"/>

  <!-- 场景底 · 空 plot -->
  <g opacity="0.65">
    <rect x="0" y="760" width="1920" height="320" fill="#2a3a20"/>
    <rect x="880" y="720" width="120" height="60" fill="url(#soil)" stroke="#3a2810"/>
    <!-- 空 plot 提示光晕 -->
    <rect x="876" y="716" width="128" height="68" fill="none" stroke="#80ff80" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  </g>

  <!-- HUD 角标 -->
  <g transform="translate(30,30)" opacity="0.85">
    <rect width="160" height="50" fill="#0a0a12" stroke="#333" rx="3"/>
    <rect x="6" y="8" width="70" height="6" fill="#40d0d0"/>
    <rect x="6" y="20" width="50" height="6" fill="#60ff80"/>
    <rect x="6" y="32" width="90" height="6" fill="#c04040"/>
    <text x="100" y="13" font-size="9" fill="#aaaa">qi 62%</text>
    <text x="100" y="25" font-size="9" fill="#aaaa">sta 58%</text>
    <text x="100" y="37" font-size="9" fill="#aaaa">hp 90%</text>
  </g>

  <!-- actionbar 提示示例 · 锄头不在主手 -->
  <g transform="translate(760,600)" opacity="0.7">
    <rect width="400" height="28" fill="#0a0a12" stroke="#8a6a40" rx="3"/>
    <text x="200" y="19" font-size="12" fill="#c8a878" text-anchor="middle">需持锄方可开垦 · 空 plot 无需锄头</text>
  </g>

  <!-- ============ 主浮窗 · 种植（空 plot → 选种子） · 500 × 520 ============ -->
  <g transform="translate(710,250)">
    <rect x="4" y="4" width="500" height="520" fill="#000" opacity="0.55" rx="8"/>
    <rect width="500" height="520" fill="#14141f" stroke="#80c060" stroke-width="2" rx="8"/>
    <rect width="500" height="40" fill="#1a2a18" stroke="#80c060" rx="8"/>
    <rect y="32" width="500" height="8" fill="#1a2a18"/>
    <text x="20" y="26" font-size="15" fill="#c0e0a0" font-weight="bold">灵田 · 播种</text>
    <text x="480" y="26" font-size="12" fill="#888" text-anchor="end">ESC 取消</text>

    <!-- plot 状态小栏 -->
    <g transform="translate(20,54)">
      <rect width="460" height="64" fill="#0a0a14" stroke="#3a4a30" rx="3"/>
      <rect x="8" y="8" width="48" height="48" fill="url(#soil)"/>
      <g transform="translate(70,0)">
        <text x="0" y="16" font-size="12" fill="#cccccc">空田（待种）· 位于 LingquanMarsh</text>
        <text x="0" y="34" font-size="10" fill="#aaaa">plot_qi_cap 1.80（基线 1.0 + 湿地 +0.5 + 水源 +0.3）</text>
        <text x="0" y="50" font-size="10" fill="#aaaa">harvest_count 0 / 5 · 新开垦 · owner: self</text>
      </g>
    </g>

    <!-- 种子列表（从 SeedRegistry 匹配背包） -->
    <g transform="translate(20,134)">
      <text x="0" y="0" font-size="12" fill="#c0e0a0" font-weight="bold">选择种子（背包内）</text>
      <text x="460" y="0" font-size="10" fill="#aaaa" text-anchor="end">筛自 SeedRegistry · cultivable 作物</text>

      <!-- 项 1 · 选中 · 刺舌蒿种 -->
      <g transform="translate(0,14)">
        <rect width="460" height="56" fill="#2a4a28" stroke="#80ff80" stroke-width="2" rx="3"/>
        <rect x="8" y="10" width="36" height="36" fill="#1a2a18" stroke="#80ff80"/>
        <text x="26" y="33" font-size="11" fill="#80ff80" text-anchor="middle">刺</text>
        <g transform="translate(56,0)">
          <text x="0" y="16" font-size="13" fill="#ffffff" font-weight="bold">刺舌蒿种 · ci_she_hao_seed ×4</text>
          <text x="0" y="34" font-size="10" fill="#aaaa">生长 8h · plot_qi 低 · 凝脉散引药</text>
          <text x="0" y="50" font-size="10" fill="#80ff80">✓ 适合本地 biome · 需求 spirit_qi ≥ 0.2</text>
        </g>
        <text x="452" y="34" font-size="10" fill="#80ff80" text-anchor="end" font-weight="bold">选中</text>
      </g>

      <!-- 项 2 · 可用 · 凝脉草种 -->
      <g transform="translate(0,74)">
        <rect width="460" height="56" fill="#1a1a26" stroke="#444" rx="3"/>
        <rect x="8" y="10" width="36" height="36" fill="#0a1a18" stroke="#60c080"/>
        <text x="26" y="33" font-size="11" fill="#60c080" text-anchor="middle">凝</text>
        <g transform="translate(56,0)">
          <text x="0" y="16" font-size="13" fill="#cccccc">凝脉草种 · ning_mai_cao_seed ×2</text>
          <text x="0" y="34" font-size="10" fill="#888">生长 16h · plot_qi 中 · 凝脉散主料</text>
          <text x="0" y="50" font-size="10" fill="#80ff80">✓ 适合（spirit_qi 0.58 满足 &gt; 0.4）</text>
        </g>
      </g>

      <!-- 项 3 · 条件不足 · 固元根种 -->
      <g transform="translate(0,134)">
        <rect width="460" height="56" fill="#1a1214" stroke="#6a4040" rx="3"/>
        <rect x="8" y="10" width="36" height="36" fill="#1a0a0a" stroke="#c04040"/>
        <text x="26" y="33" font-size="11" fill="#c04040" text-anchor="middle">固</text>
        <g transform="translate(56,0)">
          <text x="0" y="16" font-size="13" fill="#c89090">固元根种 · gu_yuan_gen_seed ×1</text>
          <text x="0" y="34" font-size="10" fill="#888">生长 96h（4 天）· plot_qi 高 · 固元丹主料</text>
          <text x="0" y="50" font-size="10" fill="#ff8080">✗ 本地 spirit_qi 不足（需 &gt; 0.6，实 0.58）</text>
        </g>
      </g>

      <!-- 项 4 · 锁 · 灵木苗种稀有 -->
      <g transform="translate(0,194)">
        <rect width="460" height="56" fill="#0a1a14" stroke="#3a4a40" stroke-dasharray="4 3" rx="3"/>
        <rect x="8" y="10" width="36" height="36" fill="#1a2a24" stroke="#60c0a0" stroke-dasharray="3 2"/>
        <text x="26" y="33" font-size="11" fill="#60c0a0" text-anchor="middle">灵</text>
        <g transform="translate(56,0)">
          <text x="0" y="16" font-size="13" fill="#888" font-style="italic">灵木苗种（背包无）</text>
          <text x="0" y="34" font-size="10" fill="#666">生长 480h（20 天）· forge 载体 · 掉率 10%</text>
          <text x="0" y="50" font-size="10" fill="#888">— 需先在 LingquanMarsh 采集灵木抽种</text>
        </g>
      </g>

      <!-- 滚动提示 -->
      <text x="230" y="272" font-size="10" fill="#666" text-anchor="middle" font-style="italic">↓ 滚动查看更多（共 4 / 10 种子定义）</text>
    </g>

    <!-- 播种按钮 -->
    <g transform="translate(20,430)">
      <rect width="460" height="50" fill="#2a4a28" stroke="#80ff80" stroke-width="2" rx="6"/>
      <text x="230" y="24" font-size="14" fill="#c0ff80" text-anchor="middle" font-weight="bold">播种 · 刺舌蒿</text>
      <text x="230" y="42" font-size="10" fill="#80c080" text-anchor="middle">1s session · 可 ESC 取消 · 消耗种子 ×1 + herbalism XP +1</text>
      <rect x="8" y="8" width="24" height="18" fill="#0a0a12" stroke="#80ff80"/>
      <text x="20" y="21" font-size="10" fill="#80ff80" text-anchor="middle">E</text>
    </g>

    <!-- 底部说明 -->
    <g transform="translate(20,492)">
      <text x="0" y="0" font-size="10" fill="#888">播种后 plot 进入生长态 · 右键即进补灵/收获视图（见 lingtian-plot.svg）</text>
      <text x="0" y="18" font-size="10" fill="#ff9090">⚠ 条件不满足的种子可强行播种，但大概率长势差/死亡（玩家自负）</text>
    </g>
  </g>

  <!-- ============ 右侧：播种中进度态（session 进行） ============ -->
  <g transform="translate(1270,250)" opacity="0.95">
    <rect x="4" y="4" width="440" height="200" fill="#000" opacity="0.55" rx="8"/>
    <rect width="440" height="200" fill="#14141f" stroke="#80c060" stroke-width="2" rx="8"/>
    <rect width="440" height="40" fill="#1a2a18" stroke="#80c060" rx="8"/>
    <rect y="32" width="440" height="8" fill="#1a2a18"/>
    <text x="20" y="26" font-size="14" fill="#c0e0a0" font-weight="bold">播种进行中</text>
    <text x="420" y="26" font-size="11" fill="#888" text-anchor="end">另一态：1s 播种 session</text>

    <g transform="translate(20,60)">
      <text x="0" y="14" font-size="12" fill="#cccccc">刺舌蒿种 → 空田</text>
      <text x="400" y="14" font-size="11" fill="#80ff80" text-anchor="end">0.6 / 1.0s</text>
      <rect x="0" y="24" width="400" height="14" fill="#001020" stroke="#666"/>
      <rect x="0" y="24" width="240" height="14" fill="#80ff80"/>
      <text x="200" y="35" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">60%</text>
    </g>

    <g transform="translate(20,120)">
      <text x="0" y="0" font-size="11" fill="#aaaa">种子 ×4 → ×3（完成时扣）</text>
      <text x="0" y="18" font-size="10" fill="#ff9090">ESC / WASD 取消 · 种子不扣</text>
      <text x="0" y="36" font-size="10" fill="#aaaa">受击打断 · 种子不扣（区别于炼丹：播种是轻动作）</text>
    </g>
  </g>

  <!-- ============ 左侧：空 plot 概念图（无作物态） ============ -->
  <g transform="translate(130,280)">
    <rect x="4" y="4" width="420" height="420" fill="#000" opacity="0.55" rx="8"/>
    <rect width="420" height="420" fill="#14141f" stroke="#6a5030" stroke-width="2" rx="8"/>
    <rect width="420" height="40" fill="#2a2018" stroke="#6a5030" rx="8"/>
    <rect y="32" width="420" height="8" fill="#2a2018"/>
    <text x="20" y="26" font-size="14" fill="#e8d8a8" font-weight="bold">空 plot · 状态说明</text>

    <g transform="translate(20,60)">
      <rect width="380" height="80" fill="#0a0a14" stroke="#3a4a30"/>
      <rect x="150" y="20" width="80" height="40" fill="url(#soil)"/>
      <rect x="148" y="18" width="84" height="44" fill="none" stroke="#80ff80" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="190" y="94" font-size="10" fill="#aaaa" text-anchor="middle">空田 · 等待播种（高亮提示）</text>
    </g>

    <g transform="translate(20,166)">
      <text x="0" y="0" font-size="12" fill="#c8a878" font-weight="bold">交互路径</text>
      <text x="0" y="22" font-size="11" fill="#cccccc">① 右键空 plot → 弹本浮窗</text>
      <text x="0" y="40" font-size="11" fill="#cccccc">② 选种子 → 按 E 播种 1s</text>
      <text x="0" y="58" font-size="11" fill="#cccccc">③ 完成后 plot 转入 "生长中" 态</text>
      <text x="0" y="76" font-size="11" fill="#cccccc">④ 后续交互走 lingtian-plot.svg</text>

      <text x="0" y="110" font-size="12" fill="#c8a878" font-weight="bold">与已实现三态关系</text>
      <text x="0" y="132" font-size="10" fill="#80c060">→ 生长/补灵（lingtian-plot 浮窗 1）</text>
      <text x="0" y="150" font-size="10" fill="#c0a060">→ 熟/收获（浮窗 2）</text>
      <text x="0" y="168" font-size="10" fill="#c8a878">→ 贫瘠/翻新（浮窗 3）</text>
      <text x="0" y="186" font-size="10" fill="#888" font-style="italic">本图 = 缺失的第四入口（空 → 种）</text>
    </g>
  </g>

  <!-- ============ 底脚 ============ -->
  <g transform="translate(100,810)">
    <text x="0" y="0" font-size="12" fill="#aaa" font-weight="bold">种植浮窗 · plan-lingtian-v1 §1.2.3-1.2.4 · 客户端 UI 层级 = A（HUD 浮窗）</text>
    <text x="0" y="22" font-size="11" fill="#aaa">触发：右键**空 plot**（需已开垦完成）· 空 plot 右键**无需主手持锄**（与开垦区别）</text>
    <text x="0" y="42" font-size="11" fill="#aaa">种子列表来源：<tspan fill="#80ffff">SeedRegistry</tspan>（由 PlantKindRegistry 派生，筛 cultivable=true）交叉 <tspan fill="#80ffff">InventoryStateStore</tspan></text>
    <text x="0" y="62" font-size="11" fill="#aaa">条件校验：适配 biome ✓ / spirit_qi 阈值 ✓ / 有无 seed item ✓ —— 但**不强制**，玩家可无视条件强种（自负后果）</text>
    <text x="0" y="82" font-size="11" fill="#ffcc40">新增 Store：<tspan fill="#80ffff">PlantingSessionStore</tspan>（列表 + 选中 seed_id + session 进度）· Channel：<tspan fill="#ffcc40">bong:lingtian/plant</tspan></text>
    <text x="0" y="102" font-size="11" fill="#888">种植为"轻动作"：ESC/WASD/受击都可打断且**种子不扣**（区别炼丹/锻造，session 完成才扣）</text>
  </g>
</svg>
