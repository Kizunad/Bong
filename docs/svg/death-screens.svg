<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="50%" stop-color="#1a0a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1200" fill="#0a0506"/>
  <text x="30" y="40" font-size="22" fill="#ffffff" font-weight="bold">死亡 / 终结 画面（草图）· 渲染层 B（Screen）</text>
  <text x="30" y="64" font-size="13" fill="#888">§8 死亡-重生流程 · 两种模式共享布局，差异在顶部标题与按钮区</text>
  <text x="30" y="84" font-size="11" fill="#ffcc40">下发：UiOpenState.template("death_screen", "death" | "terminate") → UiOpenScreens 硬编码两个独立 BaseOwoScreen · 遗念/终焉之言/运数明细由 server 预生成后通过 DeathPayload 下发（非 Dynamic XML）</text>

  <!-- ===== 左：死亡画面（可重生） ===== -->
  <g transform="translate(40,100)">
    <rect width="920" height="1020" fill="#1a0808" stroke="#a03030" stroke-width="2" rx="6"/>
    <rect x="0" y="0" width="920" height="1020" fill="url(#vignette)"/>

    <text x="460" y="70" font-size="48" fill="#ff4040" text-anchor="middle" font-weight="bold">你死了</text>
    <text x="460" y="110" font-size="16" fill="#cccccc" text-anchor="middle">第 2 次死亡 · 运数剩余 3 / 5</text>

    <!-- 死因 -->
    <g transform="translate(40,150)">
      <rect width="840" height="80" fill="#2a1010" stroke="#661010" rx="4"/>
      <text x="20" y="30" font-size="13" fill="#888">死因（DeathEvent）</text>
      <text x="20" y="58" font-size="18" fill="#ff8080">被 野狼 咬断颈动脉（左颈 · 失血过多）</text>
    </g>

    <!-- 死前场景关键数据 -->
    <g transform="translate(40,260)">
      <rect width="840" height="110" fill="#1a1a1a" stroke="#444" rx="4"/>
      <text x="20" y="26" font-size="13" fill="#888">死前瞬间（战斗摘要）</text>
      <text x="20" y="52" font-size="12" fill="#cccccc">位置：血谷 (-234, 68, 1890) · 附近敌意：2（野狼×1、血鸦×1）</text>
      <text x="20" y="72" font-size="12" fill="#cccccc">战前 HP 18/20 · 真元 90/280 · Stamina 12/100（濒临耗尽）</text>
      <text x="20" y="92" font-size="12" fill="#cccccc">身上伤口 4 处（其中 2 未处理）· 状态效果：流血×3、减速</text>
    </g>

    <!-- 运数判定 -->
    <g transform="translate(40,400)">
      <rect width="840" height="200" fill="#0a1a2a" stroke="#40a0ff" stroke-width="2" rx="4"/>
      <text x="20" y="26" font-size="13" fill="#80c0ff">DeathArbiter 运数判定</text>
      <text x="20" y="56" font-size="14" fill="#cccccc">当前 Karma：<tspan fill="#ffcc40" font-weight="bold">+2</tspan>（善业占优 → 豁免概率 +8%）</text>
      <text x="20" y="80" font-size="14" fill="#cccccc">基准豁免概率：25%</text>
      <text x="20" y="104" font-size="14" fill="#cccccc">修正后豁免率：<tspan fill="#ffcc40" font-weight="bold">33%</tspan></text>

      <!-- 骰子结果（可视化） -->
      <g transform="translate(500,40)">
        <rect width="300" height="150" fill="#000000" stroke="#80c0ff" stroke-dasharray="3 2"/>
        <text x="150" y="28" font-size="12" fill="#80c0ff" text-anchor="middle">rand() = 0.47</text>
        <!-- 概率条 -->
        <rect x="10" y="40" width="280" height="14" fill="#1a1a1a"/>
        <rect x="10" y="40" width="92" height="14" fill="#ffcc40"/>
        <line x1="142" y1="36" x2="142" y2="58" stroke="#ff4040" stroke-width="2"/>
        <text x="10" y="74" font-size="10" fill="#ffcc40">33% 豁免阈值</text>
        <text x="142" y="80" font-size="10" fill="#ff4040" text-anchor="middle">↑ 0.47 超过阈值</text>
        <text x="150" y="120" font-size="18" fill="#ff4040" text-anchor="middle" font-weight="bold">★ 未豁免 → 常规重生</text>
      </g>
      <text x="20" y="180" font-size="11" fill="#888">※ 若豁免成功会显示 "天命眷顾，你侥幸活下"（原地复活 30% HP）</text>
    </g>

    <!-- 遗念（若触发） -->
    <g transform="translate(40,630)">
      <rect width="840" height="200" fill="#200810" stroke="#c04060" stroke-width="2" stroke-dasharray="4 2" rx="4"/>
      <text x="20" y="26" font-size="13" fill="#ff8080" font-weight="bold">遗念（DeathNote · 由天道 agent 生成）</text>
      <text x="20" y="60" font-size="14" fill="#ffccdd" font-style="italic">「雪渐沉，刀未挂鞘。</text>
      <text x="20" y="82" font-size="14" fill="#ffccdd" font-style="italic">  那只狼的眼比血还红——</text>
      <text x="20" y="104" font-size="14" fill="#ffccdd" font-style="italic">  我记着，下次不会再从西侧下坡。」</text>
      <text x="20" y="150" font-size="11" fill="#888">— 真实，无高阶谎言（worldview §十二）· 将写入本角色生平卷</text>
      <text x="20" y="172" font-size="11" fill="#aaa">来源：deathnote tool · 基于死前战斗摘要 + 玩家过往决策</text>
    </g>

    <!-- 按钮区 -->
    <g transform="translate(40,860)">
      <g>
        <rect width="400" height="80" fill="#204060" stroke="#80c0ff" stroke-width="3" rx="6"/>
        <text x="200" y="36" font-size="20" fill="#a0ddff" text-anchor="middle" font-weight="bold">◀ 重生</text>
        <text x="200" y="62" font-size="11" fill="#cccccc" text-anchor="middle">运数 -1 · 回溯出生点 · 保留修为</text>
      </g>
      <g transform="translate(420,0)">
        <rect width="400" height="80" fill="#2a0a0a" stroke="#ff4040" stroke-width="2" rx="6"/>
        <text x="200" y="36" font-size="20" fill="#ff8080" text-anchor="middle" font-weight="bold">⌛ 终结</text>
        <text x="200" y="62" font-size="11" fill="#ffaaaa" text-anchor="middle">放弃运数 · 写入生平卷 · 重开角色</text>
      </g>
      <!-- 倒计时 -->
      <g transform="translate(0,100)">
        <text x="0" y="0" font-size="11" fill="#aaaa">60s 未操作 → 默认重生</text>
        <rect x="0" y="10" width="820" height="6" fill="#1a1a1a"/>
        <rect x="0" y="10" width="640" height="6" fill="#ffcc40"/>
        <text x="820" y="20" font-size="11" fill="#ffcc40" text-anchor="end">43s</text>
      </g>
    </g>
  </g>

  <!-- ===== 右：终结画面（运数耗尽 / 主动选择） ===== -->
  <g transform="translate(980,100)">
    <rect width="900" height="1020" fill="#050505" stroke="#ffffff" stroke-width="1" rx="6"/>
    <rect x="0" y="0" width="900" height="1020" fill="url(#vignette)"/>

    <text x="450" y="80" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold">终</text>
    <text x="450" y="130" font-size="16" fill="#aaaa" text-anchor="middle">Lifecycle.death_count = 5 · fortune_remaining = 0</text>

    <!-- 生平摘要（简版） -->
    <g transform="translate(40,170)">
      <rect width="820" height="200" fill="#0a0a0f" stroke="#666"/>
      <text x="20" y="26" font-size="13" fill="#cccccc">生平卷 · biography/&lt;character_id&gt;.json（全量保留）</text>
      <text x="20" y="60" font-size="13" fill="#ffffff">角色：<tspan fill="#ffcc80">陈怀素</tspan> · 宗门：无 · 真元色：<tspan fill="#40a0ff">青</tspan></text>
      <text x="20" y="84" font-size="13" fill="#cccccc">生存时长：<tspan fill="#ffffff">14天 6时 42分</tspan> · 跨 <tspan fill="#ffffff">3</tspan> 区域</text>
      <text x="20" y="108" font-size="13" fill="#cccccc">击杀：野狼 12 · 缝合兽 3 · 玩家 1 · 累计 Karma：<tspan fill="#ffcc40">+2 → -1</tspan></text>
      <text x="20" y="132" font-size="13" fill="#cccccc">最高境界：炼气三层 · 掌握 technique：爆脉初式、导真元</text>
      <text x="20" y="156" font-size="13" fill="#cccccc">疤痕：<tspan fill="#ff8080">左胸贯穿 · 右腿筋断</tspan> · 业力链：欠狼群 3 债</text>
      <text x="20" y="180" font-size="11" fill="#888">※ 此卷将永久存档，library-web 可查阅/搜索</text>
    </g>

    <!-- 终焉之言 -->
    <g transform="translate(40,400)">
      <rect width="820" height="260" fill="#100808" stroke="#c04040" stroke-width="2" stroke-dasharray="5 3"/>
      <text x="20" y="30" font-size="14" fill="#ff8080" font-weight="bold">终焉之言（FinalWords · 天道生成）</text>
      <text x="20" y="70" font-size="16" fill="#ffdddd" font-style="italic">「我这一生，</text>
      <text x="20" y="100" font-size="16" fill="#ffdddd" font-style="italic">  见过血谷之雪，也见过青云的月。</text>
      <text x="20" y="130" font-size="16" fill="#ffdddd" font-style="italic">  只是修为太浅，没等到第二场春天。</text>
      <text x="20" y="160" font-size="16" fill="#ffdddd" font-style="italic">  若有后来人，替我去看看雾林北的石碑——</text>
      <text x="20" y="190" font-size="16" fill="#ffdddd" font-style="italic">  那上面刻着我师兄的名字。」</text>
      <text x="20" y="230" font-size="11" fill="#888">— 陈怀素 · 绝笔</text>
    </g>

    <!-- 遗产选择 -->
    <g transform="translate(40,690)">
      <text x="0" y="20" font-size="13" fill="#ffcc80" font-weight="bold">遗产处置（可选）</text>
      <g transform="translate(0,36)">
        <rect width="400" height="50" fill="#1a2a1a" stroke="#40ff40"/>
        <text x="10" y="20" font-size="12" fill="#80ff80">☑ 生成石碑：记录姓名 + 真元色 + 最后位置</text>
        <text x="10" y="38" font-size="10" fill="#aaaa">其他玩家经过时可见</text>
      </g>
      <g transform="translate(410,36)">
        <rect width="410" height="50" fill="#1a1a2a" stroke="#6080ff" stroke-dasharray="3 2"/>
        <text x="10" y="20" font-size="12" fill="#80a0ff">□ 法宝魂契转让（若有已契约法宝）</text>
        <text x="10" y="38" font-size="10" fill="#aaaa">指定继承人（character_id）· 否则法宝"归野"</text>
      </g>
      <g transform="translate(0,100)">
        <rect width="820" height="50" fill="#0a0a1f" stroke="#444"/>
        <text x="10" y="20" font-size="12" fill="#cccccc">□ 身体 → 变为地图交互点（敌 NPC 可拾取/祭祀）</text>
        <text x="10" y="38" font-size="10" fill="#888">见 worldview §十二 / plan-stealth-chase 搜打撤机制</text>
      </g>
    </g>

    <!-- 创建新角色按钮 -->
    <g transform="translate(40,880)">
      <rect width="820" height="100" fill="#303030" stroke="#ffffff" stroke-width="3" rx="6"/>
      <text x="410" y="40" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">✦ 创建新角色 ✦</text>
      <text x="410" y="70" font-size="12" fill="#cccccc" text-anchor="middle">可选宗门 / 资质 / 真元色 · 修为从零开始</text>
      <text x="410" y="88" font-size="10" fill="#888" text-anchor="middle">无按键绑定 · 鼠标点击确认</text>
    </g>
  </g>

  <text x="30" y="1180" font-size="11" fill="#666">数据契约：DeathEvent + DeathArbiter 决策 + DeathNote/FinalWords tool 产出 · 按键绑定 1=重生 / 2=终结</text>
</svg>
