<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="'Noto Sans CJK SC', sans-serif">
  <rect width="1920" height="1200" fill="#0a0a12"/>

  <text x="30" y="40" font-size="22" fill="#ffffff" font-weight="bold">武器 / 法宝 UI（草图）</text>
  <text x="30" y="64" font-size="13" fill="#888">§6.10 · 落位：tooltip 扩展现有 ItemTooltipPanel（A）+ 独立 TreasureDetailScreen（B）+ ForgeWeaponScreen（B）</text>
  <text x="30" y="84" font-size="11" fill="#ffcc40">集成点：InventoryItem 模型扩展 treasure 字段 · InspectScreen 右键物品 → TreasureDetailScreen.open(item)</text>

  <!-- ==== A：普通武器 tooltip（悬停展开） ==== -->
  <g transform="translate(40,100)">
    <rect width="520" height="580" fill="#14141f" stroke="#a08060" stroke-width="2" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#ffcc80" font-weight="bold">A · 普通武器 · hover tooltip</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">背包内悬停武器 → 展开</text>

    <!-- 武器名 -->
    <g transform="translate(20,80)">
      <rect width="480" height="60" fill="#2a2a1a" stroke="#cca040" stroke-width="2"/>
      <text x="15" y="28" font-size="18" fill="#ffe080" font-weight="bold">青钢长刀</text>
      <text x="15" y="48" font-size="11" fill="#aaaa">LongSword · 单手 · reach 2.5m · grade 2（精铁）</text>
    </g>

    <!-- 数值 -->
    <g transform="translate(20,160)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">数值（§6.4 MaterialGrade）</text>
      <text x="0" y="24" font-size="12" fill="#cccccc">基础伤害 base_damage</text>
      <text x="480" y="24" font-size="12" fill="#ffcc80" text-anchor="end">14-20</text>
      <text x="0" y="44" font-size="12" fill="#cccccc">真元导流 qi_channel_mul</text>
      <text x="480" y="44" font-size="12" fill="#80ddff" text-anchor="end">×0.9</text>
      <text x="0" y="64" font-size="12" fill="#cccccc">攻速系数 swing_speed</text>
      <text x="480" y="64" font-size="12" fill="#80ff80" text-anchor="end">1.0</text>
      <text x="0" y="84" font-size="12" fill="#cccccc">耐久</text>
      <text x="480" y="84" font-size="12" fill="#ffcc80" text-anchor="end">320 / 400</text>
      <rect x="0" y="94" width="480" height="8" fill="#1a1a1a" stroke="#444"/>
      <rect x="0" y="94" width="384" height="8" fill="#ffcc40"/>
    </g>

    <!-- Ability 格子 -->
    <g transform="translate(20,300)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">装备 Ability（普通武器无 · 法宝才有）</text>
      <g transform="translate(0,10)">
        <rect width="160" height="60" fill="#0f0f12" stroke="#444" stroke-dasharray="3 2"/>
        <text x="80" y="36" font-size="11" fill="#666" text-anchor="middle">—</text>
      </g>
      <g transform="translate(170,10)">
        <rect width="160" height="60" fill="#0f0f12" stroke="#444" stroke-dasharray="3 2"/>
        <text x="80" y="36" font-size="11" fill="#666" text-anchor="middle">—</text>
      </g>
      <g transform="translate(340,10)">
        <rect width="160" height="60" fill="#0f0f12" stroke="#444" stroke-dasharray="3 2"/>
        <text x="80" y="36" font-size="11" fill="#666" text-anchor="middle">—</text>
      </g>
    </g>

    <!-- 材质描述 -->
    <g transform="translate(20,410)">
      <rect width="480" height="70" fill="#101010" stroke="#666"/>
      <text x="10" y="24" font-size="12" fill="#cccccc">【材质】精铁 · grade 2 / 5</text>
      <text x="10" y="46" font-size="11" fill="#aaaa">耐久 +40% · 不足以导引高阶真元（超过 0.8 倍会崩裂）</text>
    </g>

    <!-- 操作 -->
    <g transform="translate(20,500)">
      <rect width="230" height="48" fill="#2a2a2a" stroke="#ffffff"/>
      <text x="115" y="30" font-size="12" fill="#ffffff" text-anchor="middle">装备（E）</text>
      <rect x="250" y="0" width="230" height="48" fill="#1a2a1a" stroke="#40a040"/>
      <text x="365" y="30" font-size="12" fill="#80ff80" text-anchor="middle">修复（需材料 + 铁匠）</text>
    </g>
  </g>

  <!-- ==== B：法宝 · 展开面板（灵牌：青云令） ==== -->
  <g transform="translate(600,100)">
    <rect width="680" height="1080" fill="#14141f" stroke="#c040ff" stroke-width="3" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#ff80ff" font-weight="bold">B · 法宝 · 展开检视（按 I 或双击物品）</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">§6.6 魂契 · 仅契约者可触发 Ability</text>

    <!-- 法宝名 -->
    <g transform="translate(20,80)">
      <rect width="640" height="100" fill="#2a1a3a" stroke="#ff80ff" stroke-width="3"/>
      <text x="20" y="32" font-size="22" fill="#ffccff" font-weight="bold">青云令（Treasure · Grade 4）</text>
      <text x="20" y="58" font-size="12" fill="#cccccc">前青云宗长老佩饰 · 真元色：<tspan fill="#40a0ff">青</tspan> + <tspan fill="#ffffff">白</tspan>（混色）</text>
      <text x="20" y="80" font-size="12" fill="#ffaaff">魂契者：你（character_id ab12...）· bond_strength ★★★☆☆</text>
    </g>

    <!-- bond_strength 条 -->
    <g transform="translate(20,200)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">魂契强度 bond_strength</text>
      <rect x="0" y="10" width="640" height="16" fill="#1a0a2a" stroke="#c040ff"/>
      <rect x="0" y="10" width="420" height="16" fill="#c040ff"/>
      <text x="0" y="44" font-size="11" fill="#d0a0ff">65% · 再使用 80 小时可升 ★4</text>
      <text x="640" y="44" font-size="11" fill="#aaaa" text-anchor="end">强度 ↑ → Ability CD ↓ / qi 成本 ↓</text>
    </g>

    <!-- qi_pool -->
    <g transform="translate(20,280)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">qi_pool（法宝自存真元 · §6.5）</text>
      <rect x="0" y="10" width="640" height="16" fill="#001020" stroke="#40d0d0"/>
      <rect x="0" y="10" width="410" height="16" fill="#40d0d0"/>
      <text x="640" y="44" font-size="11" fill="#80ddff" text-anchor="end">2600 / 4000 pt</text>
      <text x="0" y="44" font-size="11" fill="#80ddff">持续回充：0.05 pt/s（灵气 0.28 的血谷）</text>
    </g>

    <!-- Abilities -->
    <g transform="translate(20,360)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">Abilities（§6.7 边界：与 technique 独立存在）</text>
      <g transform="translate(0,20)">
        <rect width="640" height="80" fill="#2a1a3a" stroke="#a040c0"/>
        <text x="16" y="26" font-size="14" fill="#c080ff" font-weight="bold">✨ 青云遁（Flash Dash）</text>
        <text x="16" y="46" font-size="11" fill="#aaaa">瞬移 12m · 180 qi · CD 40s · 触发键 Z</text>
        <text x="16" y="66" font-size="11" fill="#80c0ff">魂契 ★3 解锁 · 当前可用</text>
        <g transform="translate(500,18)">
          <rect width="120" height="44" fill="#0a2a3a" stroke="#40a0ff" rx="3"/>
          <text x="60" y="20" font-size="11" fill="#80c0ff" text-anchor="middle">状态</text>
          <text x="60" y="38" font-size="14" fill="#80c0ff" text-anchor="middle" font-weight="bold">READY</text>
        </g>
      </g>
      <g transform="translate(0,110)">
        <rect width="640" height="80" fill="#2a1a3a" stroke="#a040c0"/>
        <text x="16" y="26" font-size="14" fill="#c080ff" font-weight="bold">🛡 云雾屏障（Cloud Guard）</text>
        <text x="16" y="46" font-size="11" fill="#aaaa">吸收 200 pt 伤害 · 280 qi · CD 60s · 触发键 X</text>
        <text x="16" y="66" font-size="11" fill="#ffaa40">CD 中 · 剩余 22s</text>
        <g transform="translate(500,18)">
          <rect width="120" height="44" fill="#2a1010" stroke="#ff8040" rx="3"/>
          <text x="60" y="20" font-size="11" fill="#ff8080" text-anchor="middle">冷却</text>
          <text x="60" y="38" font-size="14" fill="#ff8080" text-anchor="middle" font-weight="bold">22s</text>
        </g>
      </g>
      <g transform="translate(0,200)">
        <rect width="640" height="80" fill="#0f0f12" stroke="#444" stroke-dasharray="3 2"/>
        <text x="16" y="26" font-size="13" fill="#666" font-weight="bold">□ 青云鉴（Skill Reveal）</text>
        <text x="16" y="46" font-size="11" fill="#666">魂契 ★5 解锁</text>
      </g>
    </g>

    <!-- prev_owners -->
    <g transform="translate(20,680)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">历代持有 prev_owners（§6.6）</text>
      <g transform="translate(0,15)">
        <rect width="640" height="30" fill="#1a1a2a"/>
        <circle cx="15" cy="15" r="6" fill="#40a0ff"/>
        <text x="30" y="20" font-size="12" fill="#a0d0ff">清虚子 · 青云宗长老 · 契约 312 天 · 死于渡劫</text>
        <text x="620" y="20" font-size="10" fill="#666" text-anchor="end">5 年前</text>
      </g>
      <g transform="translate(0,50)">
        <rect width="640" height="30" fill="#1a1a2a"/>
        <circle cx="15" cy="15" r="6" fill="#ff8040"/>
        <text x="30" y="20" font-size="12" fill="#ffb080">野贼 "赤手" · 抢夺但未成功契约（2 天解绑）</text>
        <text x="620" y="20" font-size="10" fill="#666" text-anchor="end">1 年前</text>
      </g>
      <g transform="translate(0,85)">
        <rect width="640" height="30" fill="#2a2a1a"/>
        <circle cx="15" cy="15" r="6" fill="#40ff80"/>
        <text x="30" y="20" font-size="12" fill="#a0ffa0">玩家 陈怀素（你）· 契约中 18 天</text>
        <text x="620" y="20" font-size="10" fill="#80ff80" text-anchor="end">当前</text>
      </g>
      <text x="0" y="140" font-size="10" fill="#888">※ 历代念头残留 → 使用时附带倾向（"不喜被远袭" · "偏好守护"）</text>
    </g>

    <!-- 互动按钮 -->
    <g transform="translate(20,860)">
      <rect width="200" height="50" fill="#2a2a2a" stroke="#ffffff"/>
      <text x="100" y="30" font-size="13" fill="#ffffff" text-anchor="middle">装备（E）</text>
      <rect x="210" y="0" width="200" height="50" fill="#2a1a3a" stroke="#a040c0"/>
      <text x="310" y="30" font-size="13" fill="#c080ff" text-anchor="middle">注真元（补 qi_pool）</text>
      <rect x="420" y="0" width="200" height="50" fill="#3a1010" stroke="#ff4040" stroke-dasharray="3 2"/>
      <text x="520" y="30" font-size="13" fill="#ff8080" text-anchor="middle">解契（摧毁 bond）</text>
    </g>

    <!-- 警告 -->
    <g transform="translate(20,940)">
      <rect width="640" height="100" fill="#2a1010" stroke="#ff4040" stroke-dasharray="3 2"/>
      <text x="10" y="26" font-size="13" fill="#ff8080" font-weight="bold">⚠ 死亡处理（§6.6 SoulBond）</text>
      <text x="10" y="50" font-size="11" fill="#ffcccc">持有者死亡 → 法宝进入 "休眠" 状态（地上掉落为 dormant 形态）</text>
      <text x="10" y="70" font-size="11" fill="#ffcccc">同角色重生 → 自动重新契约（character_id 不变）</text>
      <text x="10" y="90" font-size="11" fill="#ffcccc">终结 → 法宝 "归野"（可被他人重新契约 · 需 3 天磨合）</text>
    </g>
  </g>

  <!-- ==== C：铸造/修复面板 ==== -->
  <g transform="translate(1320,100)">
    <rect width="560" height="1080" fill="#14141f" stroke="#a08060" stroke-width="2" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#ffcc80" font-weight="bold">C · 铸造 / 修复（§6.8）</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">铁匠处右键工具 → 三步流程</text>

    <!-- 步骤 1：选 blueprint -->
    <g transform="translate(20,80)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">步骤 1 · 选择图纸</text>
      <g transform="translate(0,15)">
        <rect width="500" height="50" fill="#2a2a1a" stroke="#ffcc40"/>
        <text x="10" y="20" font-size="12" fill="#ffe080">✓ 青钢长刀 · 精铁图纸 · grade 2</text>
        <text x="10" y="40" font-size="10" fill="#aaaa">需材料：精铁锭 ×3 · 硬木柄 ×1 · 6 小时铸造</text>
      </g>
      <g transform="translate(0,70)">
        <rect width="500" height="40" fill="#1a1a2a" stroke="#666"/>
        <text x="10" y="26" font-size="12" fill="#aaaa">□ 其他图纸（背包内 3 张）</text>
      </g>
    </g>

    <!-- 步骤 2：材料 -->
    <g transform="translate(20,240)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">步骤 2 · 材料匹配</text>
      <g transform="translate(0,15)">
        <rect width="500" height="30" fill="#0a1a0a" stroke="#40a040"/>
        <text x="10" y="20" font-size="11" fill="#80ff80">✓ 精铁锭 3/3（背包有 5）</text>
      </g>
      <g transform="translate(0,50)">
        <rect width="500" height="30" fill="#0a1a0a" stroke="#40a040"/>
        <text x="10" y="20" font-size="11" fill="#80ff80">✓ 硬木柄 1/1</text>
      </g>
      <g transform="translate(0,85)">
        <rect width="500" height="30" fill="#2a2a0a" stroke="#ffcc40" stroke-dasharray="3 2"/>
        <text x="10" y="20" font-size="11" fill="#ffcc40">○ 可选 · 炼器符 ×1（+10% 耐久）</text>
      </g>
    </g>

    <!-- 步骤 3：注真元色 -->
    <g transform="translate(20,400)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">步骤 3 · 真元倾注（选色）</text>
      <text x="0" y="24" font-size="11" fill="#aaaa">决定武器真元色倾向 · 后续导流兼容性</text>
      <g transform="translate(0,40)">
        <circle cx="20" cy="20" r="18" fill="#40a0ff" stroke="#ffffff" stroke-width="3"/>
        <text x="20" y="24" font-size="10" fill="#ffffff" text-anchor="middle">青</text>
      </g>
      <g transform="translate(60,40)">
        <circle cx="20" cy="20" r="18" fill="#ff4040"/>
      </g>
      <g transform="translate(100,40)">
        <circle cx="20" cy="20" r="18" fill="#40ff80"/>
      </g>
      <g transform="translate(140,40)">
        <circle cx="20" cy="20" r="18" fill="#ffcc40"/>
      </g>
      <g transform="translate(180,40)">
        <circle cx="20" cy="20" r="18" fill="#c040ff"/>
      </g>
      <text x="0" y="90" font-size="10" fill="#888">已选：青 · 与你真元色匹配 → qi_channel_mul +5%</text>
      <rect x="0" y="100" width="500" height="12" fill="#001020" stroke="#40d0d0"/>
      <rect x="0" y="100" width="220" height="12" fill="#40d0d0"/>
      <text x="500" y="112" font-size="10" fill="#80ddff" text-anchor="end">投入 80/180 pt</text>
    </g>

    <!-- 计时 / 预计品质 -->
    <g transform="translate(20,560)">
      <rect width="500" height="80" fill="#2a1a1a" stroke="#ffcc40"/>
      <text x="10" y="26" font-size="13" fill="#ffcc80">预计品质分布</text>
      <text x="10" y="50" font-size="12" fill="#cccccc">grade 2：65% · grade 2+：30% · grade 3：5%</text>
      <text x="10" y="70" font-size="10" fill="#aaaa">技巧（Blacksmith level 3）影响分布 · 每级 +3% 上档</text>
    </g>

    <!-- 开始按钮 -->
    <g transform="translate(20,670)">
      <rect width="500" height="60" fill="#40301a" stroke="#ffcc40" stroke-width="3"/>
      <text x="250" y="30" font-size="18" fill="#ffe080" text-anchor="middle" font-weight="bold">▶ 开始铸造（6h）</text>
      <text x="250" y="50" font-size="11" fill="#aaaa" text-anchor="middle">完成时获系统提示 · 可挂机</text>
    </g>

    <!-- 修复模式 -->
    <g transform="translate(20,760)">
      <rect width="500" height="260" fill="#1a2a2a" stroke="#40a0a0"/>
      <text x="10" y="26" font-size="14" fill="#80dddd" font-weight="bold">【修复模式】（已装备武器）</text>
      <text x="10" y="54" font-size="12" fill="#cccccc">青钢长刀 · 耐久 320/400（80%）</text>
      <rect x="10" y="64" width="480" height="10" fill="#1a1a1a" stroke="#444"/>
      <rect x="10" y="64" width="384" height="10" fill="#40a0a0"/>
      <text x="10" y="94" font-size="11" fill="#cccccc">需材料：精铁锭 ×1 · 修复到 400</text>
      <text x="10" y="116" font-size="11" fill="#ffaa40">⚠ 修复 &gt; 3 次 → 永久上限 -5%（累计）</text>
      <g transform="translate(10,150)">
        <rect width="240" height="44" fill="#1a3a3a" stroke="#40a0a0"/>
        <text x="120" y="28" font-size="13" fill="#80dddd" text-anchor="middle">修复</text>
      </g>
      <g transform="translate(260,150)">
        <rect width="230" height="44" fill="#2a1a1a" stroke="#a04040" stroke-dasharray="3 2"/>
        <text x="115" y="28" font-size="13" fill="#ff8080" text-anchor="middle">回炉重造（-50%）</text>
      </g>
    </g>
  </g>

  <text x="30" y="1180" font-size="11" fill="#666">数据契约：Fabric ↔ server 通过 bong:combat/weapon_sync + bong:combat/treasure_ability_trigger 交互</text>
</svg>
