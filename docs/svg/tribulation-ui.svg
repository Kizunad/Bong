<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="darkSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a1f"/>
      <stop offset="50%" stop-color="#2a1030"/>
      <stop offset="100%" stop-color="#2a0a0a"/>
    </linearGradient>
    <radialGradient id="lightning" cx="50%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景：乌云压城 -->
  <rect width="1920" height="1080" fill="url(#darkSky)"/>
  <rect width="1920" height="1080" fill="url(#lightning)"/>

  <!-- 远景：山 + 小图腾 -->
  <g opacity="0.4">
    <path d="M 0 720 L 300 560 L 500 650 L 800 480 L 1200 600 L 1500 520 L 1920 620 L 1920 1080 L 0 1080 Z" fill="#2a2a3a"/>
  </g>

  <text x="30" y="36" font-size="22" fill="#ffffff" font-weight="bold">天劫广播 / 渡劫观战 UI（草图）· 混合层</text>
  <text x="30" y="58" font-size="13" fill="#aaaa">§10 · 普通天劫（突破/业力）与 化虚渡劫（全服广播 § worldview 三）两种</text>
  <text x="30" y="78" font-size="11" fill="#ffcc40">顶栏红幅广播 + 渡劫者 HUD = 渲染层 A（HudRenderCallback）| 观战询问弹窗 = 渲染层 C（server 下发 Dynamic XML · 含距离/方向/玩家名）| 数据源：TribulationStateStore（新增）</text>

  <!-- ===== A：屏幕顶部红字全服广播 ===== -->
  <g transform="translate(0,100)">
    <rect x="0" y="0" width="1920" height="120" fill="#1a0000" opacity="0.85"/>
    <rect x="0" y="0" width="1920" height="4" fill="#ff4040"/>
    <rect x="0" y="116" width="1920" height="4" fill="#ff4040"/>
    <!-- 雷云图标 -->
    <g transform="translate(80,60)">
      <text x="0" y="10" font-size="56" fill="#ffcc40" text-anchor="middle">⚡</text>
      <ellipse cx="0" cy="-20" rx="40" ry="14" fill="#444466" opacity="0.8"/>
    </g>
    <text x="160" y="56" font-size="28" fill="#ff8080" font-weight="bold">【化虚渡劫】</text>
    <text x="160" y="90" font-size="16" fill="#ffcccc">玩家 "陈怀素" 正在血谷 (-234, 1890) 渡劫 · 距你 ~ 420 m · 方向 西北</text>
    <!-- 方向指示器 -->
    <g transform="translate(1780,60)">
      <circle r="32" fill="#2a1010" stroke="#ff4040" stroke-width="2"/>
      <text x="0" y="4" font-size="32" fill="#ff8080" text-anchor="middle">↖</text>
    </g>
    <!-- 倒计时 -->
    <g transform="translate(1500,60)">
      <text x="0" y="-8" font-size="11" fill="#aaaa">波次倒计时</text>
      <text x="0" y="18" font-size="24" fill="#ffcc40" font-weight="bold">03:12</text>
    </g>
  </g>

  <!-- ===== B：渡劫者侧 HUD ===== -->
  <g transform="translate(40,280)">
    <rect width="560" height="480" fill="#14141f" stroke="#a040a0" stroke-width="2" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#d080d0" font-weight="bold">B · 渡劫者 HUD（只有被渡劫玩家能看到）</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">§10.2 化虚渡劫 · TribulationLocked 状态 · 无法脱战/逃跑</text>

    <!-- 当前波次 -->
    <g transform="translate(20,80)">
      <rect width="520" height="90" fill="#2a1a2a" stroke="#c040c0" stroke-width="2" rx="4"/>
      <text x="10" y="26" font-size="14" fill="#ffccff">第 <tspan font-size="24" font-weight="bold">3</tspan> / <tspan>9</tspan> 波 · 雷 · 直击天灵盖</text>
      <text x="10" y="54" font-size="12" fill="#cccccc">预计伤害：~ 40 HP · 真元吸收可降至 ~18 HP</text>
      <text x="10" y="72" font-size="11" fill="#ffaa40">⚠ 失败 → 直接 Terminated（不触发重生）</text>
    </g>

    <!-- 下一波倒计时 -->
    <g transform="translate(20,190)">
      <text x="0" y="0" font-size="13" fill="#ffffff" font-weight="bold">下一波 · 冰 · 冻结下盘</text>
      <rect x="0" y="10" width="520" height="18" fill="#0a0a2a" stroke="#4040ff"/>
      <rect x="0" y="10" width="260" height="18" fill="#4040ff"/>
      <text x="520" y="23" font-size="11" fill="#a0a0ff" text-anchor="end">15.2s</text>
    </g>

    <!-- 应对提示 -->
    <g transform="translate(20,250)">
      <text x="0" y="0" font-size="13" fill="#80ff80" font-weight="bold">建议应对（天道 agent 提示）</text>
      <text x="0" y="22" font-size="11" fill="#cccccc">1. 提前蓄 qi（当前 220/280 · 可满足）</text>
      <text x="0" y="42" font-size="11" fill="#cccccc">2. 下盘禁锢预警 → 考虑腾空（stamina 充足）</text>
      <text x="0" y="62" font-size="11" fill="#ff8080">3. 切勿转身（karma 惩罚：背叛）</text>
    </g>

    <!-- karma 实时 -->
    <g transform="translate(20,350)">
      <rect width="520" height="70" fill="#0a1a2a" stroke="#40a0ff" rx="4"/>
      <text x="10" y="24" font-size="13" fill="#80c0ff">当前业力总和</text>
      <text x="10" y="50" font-size="22" fill="#ffcc40" font-weight="bold">Karma = +2</text>
      <text x="510" y="50" font-size="11" fill="#80c0ff" text-anchor="end">善业多 → 劫难轻 12%</text>
    </g>
    <text x="20" y="448" font-size="11" fill="#666">※ 所有显示即时由 CHANNEL_TRIBULATION + CHANNEL_ANTICHEAT 驱动</text>
  </g>

  <!-- ===== C：观战者侧提示 ===== -->
  <g transform="translate(620,280)">
    <rect width="560" height="480" fill="#14141f" stroke="#40a040" stroke-width="2" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#80ff80" font-weight="bold">C · 50 格内观战提示</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">距离渡劫点 &lt; 50 格时自动弹出 · 可选择是否前往</text>

    <g transform="translate(20,80)">
      <rect width="520" height="150" fill="#0a1a0a" stroke="#40a040"/>
      <text x="10" y="24" font-size="14" fill="#cccccc">检测到附近渡劫事件</text>
      <text x="10" y="54" font-size="20" fill="#80ff80" font-weight="bold">陈怀素 · 化虚渡劫</text>
      <text x="10" y="80" font-size="11" fill="#aaaa">距离 38 m · 方向 东北 · 已进行 6 / 9 波</text>
      <text x="10" y="108" font-size="11" fill="#ffcc40">⚠ 渡劫雷波及半径 12m · 靠近风险：被波及 50% 伤害</text>
      <text x="10" y="130" font-size="11" fill="#ff6060">⚠ 干预渡劫 → Karma -3 · 业力链锁定</text>
    </g>

    <!-- 操作按钮 -->
    <g transform="translate(20,250)">
      <g>
        <rect width="160" height="60" fill="#204020" stroke="#40ff40" stroke-width="2" rx="4"/>
        <text x="80" y="24" font-size="14" fill="#80ff80" text-anchor="middle" font-weight="bold">👁 观战</text>
        <text x="80" y="48" font-size="10" fill="#aaffaa" text-anchor="middle">相机沿安全圈运动</text>
      </g>
      <g transform="translate(170,0)">
        <rect width="160" height="60" fill="#403020" stroke="#ffcc40" stroke-width="2" rx="4"/>
        <text x="80" y="24" font-size="14" fill="#ffcc80" text-anchor="middle" font-weight="bold">➤ 前往</text>
        <text x="80" y="48" font-size="10" fill="#ffddaa" text-anchor="middle">进入 12m 内有风险</text>
      </g>
      <g transform="translate(340,0)">
        <rect width="180" height="60" fill="#401010" stroke="#ff4040" stroke-width="2" stroke-dasharray="4 2" rx="4"/>
        <text x="90" y="24" font-size="14" fill="#ff8080" text-anchor="middle" font-weight="bold">⚔ 干预</text>
        <text x="90" y="48" font-size="10" fill="#ffaaaa" text-anchor="middle">Karma -3 · 全服广播</text>
      </g>
    </g>

    <!-- 记录选项 -->
    <g transform="translate(20,340)">
      <rect width="520" height="110" fill="#0a0a1f" stroke="#444"/>
      <text x="10" y="24" font-size="13" fill="#ffcc80" font-weight="bold">观战者 · 观战期间功能</text>
      <text x="10" y="48" font-size="11" fill="#cccccc">☑ 自动记录入 library-web（所有玩家共享阅读）</text>
      <text x="10" y="70" font-size="11" fill="#cccccc">☑ 可投掷物资（草药/丹药）但不能直接攻击雷</text>
      <text x="10" y="92" font-size="11" fill="#cccccc">☑ 镜头切换（F5）自由观察</text>
    </g>
  </g>

  <!-- ===== D：普通天劫（突破触发） ===== -->
  <g transform="translate(1200,280)">
    <rect width="680" height="480" fill="#14141f" stroke="#ffcc40" stroke-width="2" rx="6"/>
    <text x="20" y="30" font-size="18" fill="#ffee80" font-weight="bold">D · 普通天劫（突破 / 业力触发）</text>
    <text x="20" y="52" font-size="11" fill="#aaaa">§10.1 · 非全服广播 · 仅渡劫者本人与 20m 内玩家可见</text>

    <!-- 中央雷云动画 -->
    <g transform="translate(340,220)">
      <ellipse cx="0" cy="-30" rx="180" ry="40" fill="#444466" opacity="0.85"/>
      <ellipse cx="-60" cy="-50" rx="80" ry="28" fill="#2a2a44" opacity="0.7"/>
      <ellipse cx="80" cy="-40" rx="70" ry="22" fill="#2a2a44" opacity="0.7"/>
      <!-- 雷电 -->
      <path d="M -10 -10 L -20 30 L 10 20 L -4 80 L 30 40 L -2 30 L 14 -4 Z" fill="#ffcc40" stroke="#ffffff" stroke-width="1"/>
      <!-- 地上玩家 -->
      <g transform="translate(0,130)">
        <circle r="8" fill="#40a0ff"/>
        <text x="0" y="28" font-size="11" fill="#a0d0ff" text-anchor="middle">玩家（突破者）</text>
      </g>
    </g>

    <!-- 状态栏 -->
    <g transform="translate(20,410)">
      <rect width="640" height="50" fill="#2a1f0a" stroke="#ffcc40"/>
      <text x="10" y="24" font-size="13" fill="#ffcc80">突破 · 炼气三层 → 炼气四层 · 雷劫 3 波 · 已过 1/3</text>
      <text x="10" y="42" font-size="11" fill="#cccccc">karma +2 → 损失估算 12% HP / 波 · 全程约 24s</text>
    </g>
  </g>

  <!-- ===== E：底部 · 危险区半径可视化 ===== -->
  <g transform="translate(40,800)">
    <rect width="1840" height="240" fill="#14141f" stroke="#444" rx="6"/>
    <text x="20" y="30" font-size="16" fill="#ffffff" font-weight="bold">E · 渡劫现场 · 屏幕空间危险半径提示（仅观战/路过玩家）</text>

    <g transform="translate(40,80)">
      <!-- 渡劫点为中心，三个同心圆 -->
      <g transform="translate(300,80)">
        <circle r="64" fill="#ff4040" opacity="0.1" stroke="#ff4040" stroke-dasharray="4 2"/>
        <circle r="44" fill="#ffaa40" opacity="0.15" stroke="#ffaa40" stroke-dasharray="3 2"/>
        <circle r="24" fill="#40ff40" opacity="0.2" stroke="#40ff40"/>
        <circle r="4" fill="#ffffff"/>
      </g>
      <!-- 标签 -->
      <text x="400" y="40" font-size="12" fill="#ff6060">红圈：12m 雷波及范围（进入 = 50% 附带伤害）</text>
      <text x="400" y="64" font-size="12" fill="#ffaa40">橙圈：25m 震荡范围（减速 + 状态）</text>
      <text x="400" y="88" font-size="12" fill="#40ff40">绿圈：50m 观战触发范围</text>

      <!-- 路径标记 -->
      <g transform="translate(1200,10)">
        <text x="0" y="0" font-size="12" fill="#cccccc" font-weight="bold">路径记录</text>
        <text x="0" y="20" font-size="11" fill="#aaaa">观战者进入/离开红圈：自动推送 CombatEvent::TribulationProximity</text>
        <text x="0" y="40" font-size="11" fill="#aaaa">干预判定：进红圈 + 发起攻击 → Karma -3 一次扣完</text>
      </g>
    </g>

    <text x="20" y="220" font-size="11" fill="#666">数据契约：CHANNEL_TRIBULATION 广播波次 + CustomPayload bong:combat/tribulation_overlay 同步圆圈</text>
  </g>
</svg>
