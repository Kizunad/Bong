<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Noto Sans CJK SC', sans-serif">
  <defs>
    <pattern id="mcbg" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1a1a22"/>
      <rect width="40" height="40" fill="#222230" opacity="0.3"/>
      <circle cx="10" cy="10" r="0.8" fill="#333344"/>
      <circle cx="30" cy="25" r="0.6" fill="#2a2a38"/>
    </pattern>
    <pattern id="soil" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#4a3418"/>
      <circle cx="4" cy="5" r="1" fill="#6a4828"/>
      <circle cx="9" cy="9" r="1" fill="#3a2810"/>
    </pattern>
    <pattern id="soil_poor" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#3a2e28"/>
      <circle cx="4" cy="5" r="1" fill="#4a3a30"/>
      <circle cx="9" cy="9" r="1" fill="#2a2018"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#mcbg)"/>

  <!-- 场景底 · 三块田 -->
  <g opacity="0.65">
    <rect x="0" y="760" width="1920" height="320" fill="#2a3a20"/>
    <!-- 左田（生长中） -->
    <rect x="320" y="720" width="120" height="60" fill="url(#soil)" stroke="#3a2810"/>
    <g transform="translate(380,730)">
      <rect x="-2" y="0" width="4" height="18" fill="#4a6030"/>
      <ellipse cx="-6" cy="4" rx="6" ry="2" fill="#60a040"/>
      <ellipse cx="6" cy="6" rx="6" ry="2" fill="#60a040"/>
    </g>
    <!-- 中田（熟） -->
    <rect x="900" y="720" width="120" height="60" fill="url(#soil)" stroke="#3a2810"/>
    <g transform="translate(960,714)">
      <rect x="-3" y="0" width="6" height="24" fill="#6a8040"/>
      <ellipse cx="-10" cy="4" rx="10" ry="3" fill="#a0c040"/>
      <ellipse cx="10" cy="8" rx="10" ry="3" fill="#a0c040"/>
      <circle cx="0" cy="-4" r="6" fill="#e0c040"/>
    </g>
    <!-- 右田（贫瘠） -->
    <rect x="1480" y="720" width="120" height="60" fill="url(#soil_poor)" stroke="#2a2018"/>
    <g transform="translate(1540,730)" opacity="0.6">
      <rect x="-1" y="0" width="2" height="10" fill="#4a4030"/>
    </g>
  </g>

  <!-- HUD 角标 -->
  <g transform="translate(30,30)" opacity="0.85">
    <rect width="160" height="50" fill="#0a0a12" stroke="#333" rx="3"/>
    <rect x="6" y="8" width="70" height="6" fill="#40d0d0"/>
    <rect x="6" y="20" width="50" height="6" fill="#60ff80"/>
    <rect x="6" y="32" width="90" height="6" fill="#c04040"/>
    <text x="100" y="13" font-size="9" fill="#aaaa">qi 62%</text>
    <text x="100" y="25" font-size="9" fill="#aaaa">sta 58%</text>
    <text x="100" y="37" font-size="9" fill="#aaaa">hp 90%</text>
  </g>

  <!-- ================== 浮窗 1 · 生长中 + 需补灵 ================== -->
  <g transform="translate(80,220)">
    <rect x="4" y="4" width="460" height="500" fill="#000" opacity="0.55" rx="8"/>
    <rect width="460" height="500" fill="#14141f" stroke="#80c060" stroke-width="2" rx="8"/>
    <rect width="460" height="40" fill="#1a2a18" stroke="#80c060" rx="8"/>
    <rect y="32" width="460" height="8" fill="#1a2a18"/>
    <text x="20" y="26" font-size="15" fill="#c0e0a0" font-weight="bold">灵田 · 生长中</text>
    <text x="440" y="26" font-size="12" fill="#888" text-anchor="end">ESC 关闭</text>

    <!-- 作物信息 -->
    <g transform="translate(20,54)">
      <rect width="70" height="80" fill="#0a0a14" stroke="#3a4a30"/>
      <g transform="translate(35,50)">
        <rect x="-3" y="-22" width="6" height="32" fill="#4a6030"/>
        <ellipse cx="-10" cy="-16" rx="10" ry="4" fill="#60a040"/>
        <ellipse cx="10" cy="-10" rx="10" ry="4" fill="#60a040"/>
      </g>
      <g transform="translate(86,0)">
        <text x="0" y="14" font-size="12" fill="#cccccc">开脉草 · kai_mai_cao</text>
        <text x="0" y="32" font-size="11" fill="#aaaa">PlantKind 亚种 · cultivable=true</text>
        <text x="0" y="50" font-size="11" fill="#aaaa">已种 14.2 h · 预计 36h 成熟</text>
        <text x="0" y="68" font-size="10" fill="#c8a878" font-style="italic">品质累积：良（会随 plot_qi 波动）</text>
      </g>
    </g>

    <!-- 生长进度 -->
    <g transform="translate(20,156)">
      <text x="0" y="0" font-size="11" fill="#cccccc">生长进度</text>
      <text x="420" y="0" font-size="11" fill="#c0ff80" text-anchor="end">39%</text>
      <rect x="0" y="8" width="420" height="12" fill="#001020" stroke="#666"/>
      <rect x="0" y="8" width="164" height="12" fill="#c0ff80"/>
    </g>

    <!-- plot_qi（核心） -->
    <g transform="translate(20,200)">
      <text x="0" y="0" font-size="11" fill="#ffcc40" font-weight="bold">plot_qi · 田块灵气池</text>
      <text x="420" y="0" font-size="11" fill="#ff9040" text-anchor="end">0.22 / 1.80 ⚠</text>
      <rect x="0" y="8" width="420" height="14" fill="#001020" stroke="#666"/>
      <rect x="0" y="8" width="52" height="14" fill="#c08040"/>
      <text x="0" y="38" font-size="10" fill="#aaaa">cap 1.80 = 基线 1.0 + 湿地 +0.5 + 水源相邻 +0.3</text>
      <text x="0" y="54" font-size="10" fill="#ff9040">⚠ plot 灵气见底 → 正从区域漏吸（生长速率 30%）</text>
    </g>

    <!-- 补灵四来源 -->
    <g transform="translate(20,274)">
      <text x="0" y="0" font-size="12" fill="#c0e0a0" font-weight="bold">补灵（plot_qi 回补）</text>
      <text x="420" y="0" font-size="10" fill="#aaaa" text-anchor="end">冷却 72-168h · 上次 4.3 天前</text>

      <g transform="translate(0,12)">
        <rect width="420" height="30" fill="#1a1a26" stroke="#444" rx="3"/>
        <rect x="4" y="4" width="20" height="22" fill="#0a1822" stroke="#40d0d0"/>
        <text x="14" y="19" font-size="10" fill="#40d0d0" text-anchor="middle">1</text>
        <text x="32" y="14" font-size="12" fill="#cccccc">区域抽吸</text>
        <text x="32" y="27" font-size="9" fill="#888">8s · +0.5 · zone.spirit_qi −0.5</text>
        <text x="416" y="21" font-size="11" fill="#80ff80" text-anchor="end">慢但免费</text>
      </g>

      <g transform="translate(0,46)">
        <rect width="420" height="30" fill="#1a1a26" stroke="#aaaaaa" rx="3"/>
        <rect x="4" y="4" width="20" height="22" fill="#1a1a2a" stroke="#aaaaaa"/>
        <text x="14" y="19" font-size="10" fill="#aaaaaa" text-anchor="middle">2</text>
        <text x="32" y="14" font-size="12" fill="#cccccc">骨币（×1）</text>
        <text x="32" y="27" font-size="9" fill="#888">4s · +0.8 · 骨币 −1</text>
        <text x="416" y="21" font-size="11" fill="#ffcc40" text-anchor="end">快</text>
      </g>

      <g transform="translate(0,80)">
        <rect width="420" height="30" fill="#2a1a1a" stroke="#c08080" rx="3"/>
        <rect x="4" y="4" width="20" height="22" fill="#3a1a1a" stroke="#ff8080"/>
        <text x="14" y="19" font-size="10" fill="#ff8080" text-anchor="middle">3</text>
        <text x="32" y="14" font-size="12" fill="#ffcccc">异兽核（×1）</text>
        <text x="32" y="27" font-size="9" fill="#c89090">2s · +2.0 直接拉满 · 兽核 −1</text>
        <text x="416" y="21" font-size="11" fill="#ff8080" text-anchor="end">奢侈</text>
      </g>

      <g transform="translate(0,114)">
        <rect width="420" height="30" fill="#1a2030" stroke="#80c0ff" rx="3"/>
        <rect x="4" y="4" width="20" height="22" fill="#0a1a2a" stroke="#80c0ff"/>
        <text x="14" y="19" font-size="10" fill="#80c0ff" text-anchor="middle">4</text>
        <text x="32" y="14" font-size="12" fill="#cccccc">灵水（×1）</text>
        <text x="32" y="27" font-size="9" fill="#888">3s · +0.3 · 灵水 −1</text>
        <text x="416" y="21" font-size="11" fill="#80c0ff" text-anchor="end">日常</text>
      </g>
    </g>

    <!-- 底部统计 -->
    <g transform="translate(20,430)">
      <text x="0" y="0" font-size="10" fill="#888">harvest_count 2 / 5 · 翻新尚早</text>
      <text x="0" y="18" font-size="10" fill="#888">owner: self · 所在区 LingquanMarsh · zone.spirit_qi 0.58</text>
      <text x="0" y="42" font-size="10" fill="#ff9090">⚠ 补灵过早会"灵气溢出"：多出部分零和亏损</text>
      <text x="0" y="58" font-size="10" fill="#ff9090">⚠ 大规模灵田会触发天道密度阈值（worldview §七）</text>
    </g>
  </g>

  <!-- ================== 浮窗 2 · 熟 · 走采集浮窗 ================== -->
  <g transform="translate(570,220)">
    <rect x="4" y="4" width="460" height="500" fill="#000" opacity="0.55" rx="8"/>
    <rect width="460" height="500" fill="#14141f" stroke="#c0a060" stroke-width="2" rx="8"/>
    <rect width="460" height="40" fill="#2a2018" stroke="#c0a060" rx="8"/>
    <rect y="32" width="460" height="8" fill="#2a2018"/>
    <text x="20" y="26" font-size="15" fill="#e8d8a8" font-weight="bold">灵田 · 熟（可收获）</text>
    <text x="440" y="26" font-size="12" fill="#888" text-anchor="end">ESC 关闭</text>

    <!-- 作物 -->
    <g transform="translate(20,54)">
      <rect width="70" height="80" fill="#0a0a14" stroke="#3a4a30"/>
      <g transform="translate(35,56)">
        <rect x="-3" y="-24" width="6" height="34" fill="#6a8040"/>
        <ellipse cx="-10" cy="-18" rx="10" ry="4" fill="#a0c040"/>
        <ellipse cx="10" cy="-12" rx="10" ry="4" fill="#a0c040"/>
        <circle cx="0" cy="-28" r="6" fill="#e0c040"/>
      </g>
      <g transform="translate(86,0)">
        <text x="0" y="14" font-size="12" fill="#cccccc">灵稻 · ling_dao</text>
        <text x="0" y="32" font-size="11" fill="#aaaa">12h 成熟 · 熟 2h 未收</text>
        <text x="0" y="50" font-size="11" fill="#80ff80">品质累积：良（plot_qi 稳定，无抖动）</text>
        <text x="0" y="68" font-size="10" fill="#c8a878" font-style="italic">"稻穗低垂，方是熟。"</text>
      </g>
    </g>

    <!-- 进度（满） -->
    <g transform="translate(20,156)">
      <text x="0" y="0" font-size="11" fill="#cccccc">生长进度</text>
      <text x="420" y="0" font-size="11" fill="#c0ff80" text-anchor="end">100% · 熟</text>
      <rect x="0" y="8" width="420" height="12" fill="#001020" stroke="#666"/>
      <rect x="0" y="8" width="420" height="12" fill="#c0ff80"/>
    </g>

    <!-- 收获 · 复用采集浮窗范式 -->
    <g transform="translate(20,200)">
      <text x="0" y="0" font-size="12" fill="#c0e0a0" font-weight="bold">收获（复用 harvest-popup 范式）</text>
      <text x="420" y="0" font-size="10" fill="#aaaa" text-anchor="end">herbalism 技艺共享</text>

      <g transform="translate(0,16)">
        <rect width="205" height="80" fill="#1a2a18" stroke="#80ff80" stroke-width="2" rx="6"/>
        <text x="102" y="22" font-size="14" fill="#c0ff80" text-anchor="middle" font-weight="bold">手动收获</text>
        <text x="102" y="42" font-size="11" fill="#aaaa" text-anchor="middle">2.5 秒 · 专注</text>
        <text x="102" y="60" font-size="10" fill="#8aaa80" text-anchor="middle">移动/受击断</text>
        <text x="102" y="74" font-size="10" fill="#8aaa80" text-anchor="middle">herbalism XP +2</text>
        <rect x="4" y="4" width="24" height="18" fill="#0a0a12" stroke="#80ff80"/>
        <text x="16" y="17" font-size="10" fill="#80ff80" text-anchor="middle">E</text>
      </g>
      <g transform="translate(215,16)">
        <rect width="205" height="80" fill="#2a2a18" stroke="#ffcc40" stroke-width="2" rx="6"/>
        <text x="102" y="22" font-size="14" fill="#ffcc40" text-anchor="middle" font-weight="bold">自动收获</text>
        <text x="102" y="42" font-size="11" fill="#aaaa" text-anchor="middle">6.0 秒 · 免操作</text>
        <text x="102" y="60" font-size="10" fill="#c0a060" text-anchor="middle">品质稳定</text>
        <text x="102" y="74" font-size="10" fill="#c0a060" text-anchor="middle">XP +5（熟练 Lv.4）</text>
        <rect x="4" y="4" width="24" height="18" fill="#0a0a12" stroke="#ffcc40"/>
        <text x="16" y="17" font-size="10" fill="#ffcc40" text-anchor="middle">R</text>
      </g>
    </g>

    <!-- 品质分布（熟后确定） -->
    <g transform="translate(20,320)">
      <text x="0" y="0" font-size="11" fill="#cccccc">品质预测（自动·Lv.4）</text>
      <g transform="translate(0,10)" font-size="9">
        <rect x="0" y="0" width="50" height="14" fill="#2a2020"/>
        <rect x="50" y="0" width="100" height="14" fill="#604020"/>
        <rect x="150" y="0" width="210" height="14" fill="#806040"/>
        <rect x="360" y="0" width="60" height="14" fill="#c0a060"/>
        <text x="25"  y="11" fill="#aaaa" text-anchor="middle">劣 12%</text>
        <text x="100" y="11" fill="#e8d8a8" text-anchor="middle">普 24%</text>
        <text x="255" y="11" fill="#ffffff" text-anchor="middle">良 50%</text>
        <text x="390" y="11" fill="#ffffff" text-anchor="middle">极 14%</text>
      </g>
    </g>

    <!-- 田块状态 -->
    <g transform="translate(20,370)">
      <text x="0" y="0" font-size="11" fill="#cccccc">田块状态</text>
      <text x="0" y="18" font-size="10" fill="#aaaa">harvest_count 4 / 5 · 下次收获后需翻新</text>
      <rect x="0" y="24" width="420" height="10" fill="#001020" stroke="#666"/>
      <rect x="0" y="24" width="336" height="10" fill="#c0a060"/>

      <text x="0" y="56" font-size="10" fill="#aaaa">plot_qi 1.24 / 1.80 · 采走后清零</text>
      <text x="0" y="74" font-size="10" fill="#ff9090">⚠ 作物采走 = 灵气永远流出本区（与 botany 闭环一致）</text>
    </g>

    <g transform="translate(20,450)">
      <text x="0" y="0" font-size="10" fill="#888">收获后 plot 自动进空田状态（可再种）</text>
      <text x="0" y="18" font-size="10" fill="#888">harvest_count 满 5 → 变"贫瘠"，需锄头翻新</text>
    </g>
  </g>

  <!-- ================== 浮窗 3 · 贫瘠 · 翻新 ================== -->
  <g transform="translate(1060,220)">
    <rect x="4" y="4" width="460" height="500" fill="#000" opacity="0.55" rx="8"/>
    <rect width="460" height="500" fill="#14141f" stroke="#8a6a40" stroke-width="2" rx="8"/>
    <rect width="460" height="40" fill="#2a2018" stroke="#8a6a40" rx="8"/>
    <rect y="32" width="460" height="8" fill="#2a2018"/>
    <text x="20" y="26" font-size="15" fill="#c8a878" font-weight="bold">灵田 · 贫瘠（需翻新）</text>
    <text x="440" y="26" font-size="12" fill="#888" text-anchor="end">ESC 关闭</text>

    <!-- 空 plot 预览 -->
    <g transform="translate(20,54)">
      <rect width="70" height="80" fill="url(#soil_poor)" stroke="#3a2810"/>
      <rect x="20" y="32" width="30" height="16" fill="#2a2018" opacity="0.6"/>
      <g transform="translate(86,0)">
        <text x="0" y="14" font-size="12" fill="#cccccc">空田 · 贫瘠</text>
        <text x="0" y="32" font-size="11" fill="#aaaa">harvest_count 5 / 5（上限）</text>
        <text x="0" y="50" font-size="11" fill="#ff9090">已不可种植</text>
        <text x="0" y="68" font-size="10" fill="#c8a878" font-style="italic">"地力已竭，须翻耕。"</text>
      </g>
    </g>

    <!-- 翻新要求 -->
    <g transform="translate(20,156)">
      <text x="0" y="0" font-size="12" fill="#c8a878" font-weight="bold">翻新要求</text>

      <g transform="translate(0,14)">
        <rect width="420" height="34" fill="#1a1a26" stroke="#c8a060" rx="3"/>
        <rect x="6" y="4" width="26" height="26" fill="#2a2020" stroke="#c8a060"/>
        <text x="19" y="22" font-size="11" fill="#c8a060" text-anchor="middle">锄</text>
        <text x="44" y="15" font-size="12" fill="#cccccc">锄头（主手）</text>
        <text x="44" y="29" font-size="10" fill="#888">耐久 −1 · 当前玄铁锄 · 87 / 100</text>
        <text x="414" y="21" font-size="11" fill="#80ff80" text-anchor="end">✓</text>
      </g>

      <g transform="translate(0,52)">
        <rect width="420" height="34" fill="#1a1a26" stroke="#444" rx="3"/>
        <rect x="6" y="4" width="26" height="26" fill="#2a1a10" stroke="#c0a060"/>
        <text x="19" y="22" font-size="10" fill="#c0a060" text-anchor="middle">肥</text>
        <text x="44" y="15" font-size="12" fill="#cccccc">肥料（×1，占位）</text>
        <text x="44" y="29" font-size="10" fill="#888">alchemy 废渣 / 骨粉 · MVP 占位</text>
        <text x="414" y="21" font-size="11" fill="#80ff80" text-anchor="end">✓ 兽骨粉 ×3</text>
      </g>

      <g transform="translate(0,90)">
        <rect width="420" height="34" fill="#1a1a26" stroke="#444" rx="3"/>
        <rect x="6" y="4" width="26" height="26" fill="#1a2a1a" stroke="#60c060"/>
        <text x="19" y="22" font-size="10" fill="#60c060" text-anchor="middle">时</text>
        <text x="44" y="15" font-size="12" fill="#cccccc">翻新 session · 5.0 秒</text>
        <text x="44" y="29" font-size="10" fill="#888">可打断（移动/受击）</text>
        <text x="414" y="21" font-size="11" fill="#c0ff80" text-anchor="end">就绪</text>
      </g>
    </g>

    <!-- 翻新按钮 -->
    <g transform="translate(20,302)">
      <rect width="420" height="56" fill="#2a2018" stroke="#c8a878" stroke-width="2" rx="6"/>
      <text x="210" y="24" font-size="14" fill="#e8d8a8" text-anchor="middle" font-weight="bold">开始翻新</text>
      <text x="210" y="44" font-size="10" fill="#c8a878" text-anchor="middle">耗锄头耐久 1 + 肥料 1 + 时间 5s</text>
      <rect x="8" y="8" width="24" height="18" fill="#0a0a12" stroke="#c8a878"/>
      <text x="20" y="21" font-size="10" fill="#c8a878" text-anchor="middle">T</text>
    </g>

    <!-- 替代动作 -->
    <g transform="translate(20,378)">
      <text x="0" y="0" font-size="11" fill="#888">或：</text>
      <rect x="30" y="-14" width="180" height="28" fill="#1a1a22" stroke="#666" rx="3"/>
      <text x="120" y="4" font-size="11" fill="#aaaa" text-anchor="middle">拆除 plot（回收位置）</text>
    </g>

    <g transform="translate(20,428)">
      <text x="0" y="0" font-size="10" fill="#888">翻新后 harvest_count → 0，plot_qi → 0</text>
      <text x="0" y="18" font-size="10" fill="#888">下次补灵需重新冷却 72-168h</text>
      <text x="0" y="42" font-size="10" fill="#ff9090">⚠ 不翻新的 plot 永久无用，浪费占地</text>
    </g>
  </g>

  <!-- ================== 底脚 ================== -->
  <g transform="translate(100,770)">
    <text x="0" y="0" font-size="12" fill="#aaa" font-weight="bold">灵田三态浮窗 · plan-lingtian-v1 §1.3-1.6 · 客户端 UI 层级 = A（HUD 浮窗，非全屏）</text>
    <text x="0" y="22" font-size="11" fill="#aaa">右键 plot → 按当前状态弹对应视图 · 同时只开一个 · 可拖拽 · 不暂停游戏</text>
    <text x="0" y="42" font-size="11" fill="#aaa">三态：<tspan fill="#80c060">生长中/补灵</tspan>（浮 1）· <tspan fill="#c0a060">熟/收获</tspan>（浮 2，复用 harvest-popup）· <tspan fill="#c8a878">贫瘠/翻新</tspan>（浮 3）</text>
    <text x="0" y="62" font-size="11" fill="#ffcc40">灵气模型 C：plot_qi &gt; 0 优先（crop 全速生长）· plot_qi = 0 走区域漏吸（30% 慢速）· 补灵冷却 72-168h · 溢出零和亏损</text>
    <text x="0" y="82" font-size="11" fill="#888">Store：<tspan fill="#80ffff">LingtianPlotStore</tspan>（当前 plot 状态）· 复用 <tspan fill="#80ffff">HarvestSessionStore</tspan> + <tspan fill="#80ffff">BotanySkillStore</tspan>（herbalism XP 共享采/种）</text>
    <text x="0" y="102" font-size="11" fill="#888">Channel：<tspan fill="#ffcc40">bong:lingtian/tick</tspan> · <tspan fill="#ffcc40">bong:lingtian/replenish</tspan> · <tspan fill="#ffcc40">bong:lingtian/harvest</tspan>（收获复用采集 channel 合流）</text>
  </g>
