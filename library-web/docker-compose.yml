name: mofa-library

services:
  library:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        GITHUB_OWNER: ${GITHUB_OWNER:-Kizunad}
        GITHUB_REPO: ${GITHUB_REPO:-Bong}
        GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
    restart: unless-stopped
    ports:
      - "3000:80"

  refresh-api:
    build:
      context: .
      dockerfile: refresh-api/Dockerfile
    environment:
      REFRESH_TOKEN: ${REFRESH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER:-Kizunad}
      GITHUB_REPO: ${GITHUB_REPO:-Bong}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      PROJECT_ROOT: /app/project
      COMPOSE_FILE: /app/project/docker-compose.yml
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-mofa-library}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:3001:8080"
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      - library

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - library
